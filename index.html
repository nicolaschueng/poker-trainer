function renderSeats() {
  const container = document.getElementById('seats-container');
  container.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const p = G.players[i];
    const pos = SEAT_POSITIONS[i];
    const seatDiv = document.createElement('div');
    seatDiv.className = 'seat';
    seatDiv.id = `seat-${i}`;
    seatDiv.style.left = pos.left;
    seatDiv.style.top = pos.top;
    seatDiv.style.transform = pos.transform || '';
    seatDiv.style.position = 'absolute';
    // Info box
    let infoClass = 'seat-info';
    if (i === HUMAN_SEAT) infoClass += ' human';
    if (p.folded) infoClass += ' folded';
    if (G.running && G.currentPlayer === i && !G.waitingForHuman) infoClass += ' active';
    if (G.running && G.currentPlayer === i && G.waitingForHuman) infoClass += ' active';
    if (i === G.dealerPos) infoClass += ' dealer';
    const betStr = p.bet > 0 ? `<div class="seat-bet">${p.bet}</div>` : `<div class="seat-bet"></div>`;
    // Cards
    let cardsHTML = '<div class="seat-cards">';
    if (p.cards.length > 0) {
      if (i === HUMAN_SEAT) {
        cardsHTML += cardHTML(p.cards[0], true) + cardHTML(p.cards[1], true);
      } else if (p.folded && G.running) {
        cardsHTML += `<div class="card small ghost"></div><div class="card small ghost"></div>`;
      } else if (p.folded && !G.running) {
        // Hand over: show folded player cards with opacity to indicate fold
        const c0 = p.cards[0], c1 = p.cards[1];
        cardsHTML += `<div style="opacity:0.45">${cardHTML(c0, true)}</div><div style="opacity:0.45">${cardHTML(c1, true)}</div>`;
      } else if (G.running) {
        cardsHTML += cardHTML(null, true, true) + cardHTML(null, true, true);
      } else {
        // Showdown: reveal if not folded
        cardsHTML += cardHTML(p.cards[0], true) + cardHTML(p.cards[1], true);
      }
    } else {
      cardsHTML += `<div class="card small ghost"></div><div class="card small ghost"></div>`;
    }
    cardsHTML += '</div>';
    seatDiv.innerHTML = `
      <div class="${infoClass}">
        <div class="seat-name">${p.name}${p.rebuys > 0 ? `<span style="color:#e85555;font-size:0.75em;font-weight:normal">(-${p.rebuys})</span>` : ''}<span>${p.position || ''} ${p.allin ? '(ALL-IN)':''}</span></div>
        <div class="seat-chips">${p.chips >= 0 ? p.chips : 0}</div>
        ${betStr}
      </div>
      ${cardsHTML}
    `;
    if (reviewMode && i !== HUMAN_SEAT) {
      seatDiv.classList.add('review-clickable');
      seatDiv.onclick = () => openReviewPanel(i);
    }
    container.appendChild(seatDiv);
  }
}

function showHumanActions() {
  const human = G.players[HUMAN_SEAT];
  const callAmt = Math.min(G.currentBet - human.bet, human.chips);
  const canCheck = G.currentBet === human.bet;
  const canRaise = human.chips > callAmt;
  const title = document.getElementById('action-title');
  title.textContent = `你的行动 (${G.street === 'preflop' ? '翻牌前' : G.street === 'flop' ? '翻牌' : G.street === 'turn' ? '转牌' : '河牌'}) | 底池: ${G.pot}`;
  const btns = document.getElementById('action-buttons');
  btns.innerHTML = '';
  // Fold button
  const foldBtn = document.createElement('button');
  foldBtn.className = 'action-btn btn-fold';
  foldBtn.textContent = '弃牌';
  foldBtn.onclick = () => humanAction('fold');
  btns.appendChild(foldBtn);
  if (canCheck) {
    const checkBtn = document.createElement('button');
    checkBtn.className = 'action-btn btn-check';
    checkBtn.textContent = '看牌';
    checkBtn.onclick = () => humanAction('check');
    btns.appendChild(checkBtn);
  } else {
    const callBtn = document.createElement('button');
    callBtn.className = 'action-btn btn-call';
    callBtn.textContent = `跟注 ${callAmt}`;
    callBtn.onclick = () => humanAction('call');
    btns.appendChild(callBtn);
  }
  if (canRaise) {
    const raiseBtn = document.createElement('button');
    raiseBtn.className = 'action-btn btn-raise';
    raiseBtn.textContent = '加注';
    raiseBtn.onclick = () => humanAction('raise');
    btns.appendChild(raiseBtn);
    const allInBtn = document.createElement('button');
    allInBtn.className = 'action-btn btn-allin';
    allInBtn.textContent = `全下 ${human.chips}`;
    allInBtn.onclick = () => humanAction('allin');
    btns.appendChild(allInBtn);
    // Raise slider
    const raiseControls = document.getElementById('raise-controls');
    raiseControls.style.display = 'flex';
    const minRaise = Math.max(G.currentBet + G.minRaise, G.currentBet * 2);
    const maxRaise = human.chips + human.bet;
    const slider = document.getElementById('raise-slider');
    slider.min = minRaise;
    slider.max = maxRaise;
    // Use coach recommended raise if available, otherwise default to midpoint
    if (G.recommendedRaise >= minRaise && G.recommendedRaise <= maxRaise) {
      G.raiseAmount = G.recommendedRaise;
    } else {
      G.raiseAmount = Math.min(minRaise + Math.floor((maxRaise - minRaise) * 0.5), maxRaise);
    }
    slider.value = G.raiseAmount;
    document.getElementById('raise-amount-display').textContent = G.raiseAmount;
  }
  document.getElementById('action-msg').textContent = canCheck ?
    '当前无需跟注，可选择看牌或下注' :
    `需跟注 ${callAmt} | 底池 ${G.pot} | 最小加注 ${G.minRaise}`;
}

  const btns = document.getElementById('action-buttons');

function updateRaiseAmount() {

function setRaisePreset(multiplier) {
  const human = G.players[HUMAN_SEAT];
  const potBet = Math.floor(G.pot * multiplier + G.currentBet);
  const maxBet = human.chips + human.bet;
  const minBet = G.currentBet + G.minRaise;
  G.raiseAmount = Math.max(minBet, Math.min(potBet, maxBet));
  const slider = document.getElementById('raise-slider');
  slider.value = G.raiseAmount;
  document.getElementById('raise-amount-display').textContent = G.raiseAmount;
}

function updateStatsPanel() {
  const human = G.players[HUMAN_SEAT];
  if (!human) return;
  document.getElementById('s-chips').textContent = human.chips;
  document.getElementById('s-chips').className = 'stat-value ' + (human.chips >= STARTING_CHIPS ? 'green' : 'red');
  document.getElementById('s-hands').textContent = G.userStats.hands;
  document.getElementById('s-wins').textContent = G.userStats.wins;
  const profit = human.chips - STARTING_CHIPS;
  document.getElementById('s-profit').textContent = (profit >= 0 ? '+' : '') + profit;
  document.getElementById('s-profit').className = 'stat-value ' + (profit >= 0 ? 'green' : 'red');
  updateUserStats();

function updateUserStats() {
  const st = G.userStats;
  const vpip = st.hands > 0 ? Math.round((st.vpipHands / st.hands) * 100) : 0;
  const pfr = st.hands > 0 ? Math.round((st.pfrHands / st.hands) * 100) : 0;
  const af = st.passiveActions > 0 ? (st.aggressiveActions / st.passiveActions).toFixed(1) : st.aggressiveActions.toFixed(1);
  document.getElementById('s-vpip').textContent = vpip + '%';
  document.getElementById('s-pfr').textContent = pfr + '%';
  document.getElementById('s-af').textContent = af;
  const rebuysEl = document.getElementById('s-rebuys');
  if (rebuysEl) {
    const totalBuys = 1 + (st.rebuys || 0);
    rebuysEl.textContent = totalBuys;
    rebuysEl.className = 'stat-value ' + (st.rebuys > 0 ? 'red' : '');
  }
}

// 风格一致性分析
const STYLE_DESCRIPTORS = {
  TAG:      { zh: 'TAG（紧凶）',  aggressivePreflop: true,  tightPreflop: true,  aggressivePostflop: true },
  LAG:      { zh: 'LAG（松凶）',  aggressivePreflop: true,  tightPreflop: false, aggressivePostflop: true },
  Rock:     { zh: 'Rock（超紧）', aggressivePreflop: false, tightPreflop: true,  aggressivePostflop: false },
  CS:       { zh: 'CS（松被动）', aggressivePreflop: false, tightPreflop: false, aggressivePostflop: false },
  Maniac:   { zh: 'Maniac（狂人）',aggressivePreflop: true, tightPreflop: false, aggressivePostflop: true },
  Balanced: { zh: 'Balanced（均衡）',aggressivePreflop: true,tightPreflop: false,aggressivePostflop: true },
  Aggro:    { zh: 'Aggro（激进）', aggressivePreflop: true, tightPreflop: false, aggressivePostflop: true },
  Passive:  { zh: 'Passive（被动）',aggressivePreflop: false,tightPreflop: false,aggressivePostflop: false },
};

function calcStyleConsistency(styleKey, logs) {
  if (!styleKey || logs.length === 0) return null;
  const desc = STYLE_DESCRIPTORS[styleKey];
  if (!desc) return null;
  const style = AI_STYLES[styleKey];

  const preflopLogs = logs.filter(l => l.street === 'preflop');
  const postflopLogs = logs.filter(l => l.street !== 'preflop');
  const aggressiveActions = new Set(['raise', 'allin']);
  const passiveActions = new Set(['call', 'check', 'fold']);

  let score = 100;
  const remarks = [];

  // --- Preflop 检查 ---
  if (preflopLogs.length > 0) {
    const pfAggressive = preflopLogs.some(l => aggressiveActions.has(l.action));
    const pfFolded = preflopLogs.every(l => l.action === 'fold');
    const avgStrength = preflopLogs.reduce((s, l) => s + (l.handStrength || 0), 0) / preflopLogs.length;

    if (desc.tightPreflop) {
      // Tight styles (TAG, Rock): should only open premium hands
      if (pfAggressive && avgStrength < 55) {
        score -= 20;
        remarks.push(`Preflop用弱牌(${Math.round(avgStrength)}%)加注，与${desc.zh}紧的风格不符`);
      } else if (pfAggressive && avgStrength >= 60) {
        remarks.push(`Preflop只open了强牌(${Math.round(avgStrength)}%)，符合${desc.zh}紧的风格`);
      }
    } else {
      // Loose styles (LAG, Maniac, CS, Aggro etc): should play wide range
      if (pfFolded) {
        score -= 15;
        remarks.push(`Preflop弃牌，${desc.zh}风格通常进牌更积极`);
      }
    }

    if (desc.aggressivePreflop) {
      if (!pfAggressive && !pfFolded) {
        score -= 15;
        remarks.push(`Preflop仅跟注，${desc.zh}风格更倾向open或3bet`);
      } else if (pfAggressive) {
        remarks.push(`Preflop有加注行为，符合${desc.zh}激进风格`);
      }
    } else {
      if (pfAggressive && style && avgStrength < 60) {
        score -= 10;
        remarks.push(`Preflop用中等牌力加注，${desc.zh}通常更保守`);
      }
    }
  }

  // --- Postflop 检查 ---
  if (postflopLogs.length > 0) {
    const pfAggressiveCount = postflopLogs.filter(l => aggressiveActions.has(l.action)).length;
    const pfPassiveCount = postflopLogs.filter(l => passiveActions.has(l.action)).length;
    const aggrRatio = pfAggressiveCount / postflopLogs.length;

    if (desc.aggressivePostflop) {
      if (aggrRatio < 0.25 && pfPassiveCount > 1) {
        score -= 20;
        remarks.push(`翻后打法偏被动(加注率${Math.round(aggrRatio*100)}%)，${desc.zh}风格应更激进`);
      } else if (aggrRatio >= 0.4) {
        remarks.push(`翻后积极下注/加注(${Math.round(aggrRatio*100)}%)，符合${desc.zh}激进风格`);
      } else {
        remarks.push(`翻后有时check，激进性略低，${desc.zh}可以更主动`);
        score -= 10;
      }
    } else {
      if (aggrRatio > 0.5) {
        score -= 15;
        remarks.push(`翻后加注频率偏高(${Math.round(aggrRatio*100)}%)，${desc.zh}风格通常更保守`);
      } else {
        remarks.push(`翻后以跟注/过牌为主，与${desc.zh}被动风格一致`);
      }
    }

    // Check river specifically
    const riverLogs = postflopLogs.filter(l => l.street === 'river');
    if (riverLogs.length > 0 && desc.aggressivePostflop) {
      const riverPassive = riverLogs.every(l => l.action === 'check' || l.action === 'call');
      if (riverPassive) {
        score -= 8;
        remarks.push(`River的check/call略显被动，${desc.zh}在价值牌上应考虑bet`);
      }
    }
  }

  score = Math.max(0, Math.min(100, score));

  // Build summary text
  let summary = '';
  if (score >= 80) {
    summary = `本手牌整体与${desc.zh}风格高度吻合。`;
  } else if (score >= 60) {
    summary = `大体符合${desc.zh}风格，但部分决策有偏差。`;
  } else if (score >= 40) {
    summary = `与${desc.zh}风格有明显出入，决策一致性不足。`;
  } else {
    summary = `本手牌打法与${desc.zh}风格差异较大，建议重新审视决策逻辑。`;
  }

  return { score, styleName: desc.zh, remarks, summary };
}

function renderReviewHighlights() {
  for (let i = 1; i < 9; i++) {
    const seat = document.getElementById(`seat-${i}`);
    if (seat) {
      seat.classList.add('review-clickable');
      seat.onclick = () => openReviewPanel(i);
    }
  }
}

function openReviewPanel(seatIdx) {
  const p = G.players[seatIdx];
  if (!p) return;
  const logs = actionLog.filter(l => l.playerId === seatIdx);

  const streetNames = { preflop: '翻牌前', flop: '翻牌圈', turn: '转牌圈', river: '河牌圈' };
  const streetOrder = ['preflop', 'flop', 'turn', 'river'];

  // Group logs by street
  const grouped = {};
  for (const log of logs) {
    if (!grouped[log.street]) grouped[log.street] = [];
    grouped[log.street].push(log);
  }

  // Build header — show final hand cards
  const cardsHTML = p.cards.map(c => {
    const isRed = c.suit === '♥' || c.suit === '♦';
    return `<div class="card small ${isRed ? 'red' : ''}" style="display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:32px;height:46px;font-size:11px;border-radius:4px;background:#fff;margin-right:3px;font-weight:bold;color:${isRed?'#c62828':'#222'}"><div>${c.rank}</div><div style="font-size:10px">${c.suit}</div></div>`;
  }).join('');

  const styleKey = p.styleKey || '';
  const styleName = p.style ? p.style.name : styleKey;
  const playerPos = p.position || '?';
  const posSummaryLabel = getPositionSummaryLabel(playerPos);
  const posMeta = POS_META[playerPos];

  let html = `
    <div class="review-header">
      <div>${cardsHTML}</div>
      <div class="review-player-info">
        <h3>${p.name}</h3>
        <div class="style-badge">${styleName} | 位置: ${posSummaryLabel}</div>
      </div>
    </div>
  `;

  // Position summary note
  if (posMeta) {
    html += `<div style="font-size:12px;color:#90a4ae;background:#0d1b35;border-radius:6px;padding:7px 10px;margin-bottom:12px;line-height:1.6;">
      <span style="color:#4fc3f7;font-weight:bold">${posMeta.label}</span>：${posMeta.note}
    </div>`;
  }

  if (logs.length === 0) {
    html += `<div style="color:#78909c;font-size:13px;text-align:center;padding:20px 0;">该玩家本手牌无行动记录</div>`;
  } else {
    for (const street of streetOrder) {
      const streetLogs = grouped[street];
      if (!streetLogs || streetLogs.length === 0) continue;
      // Per-street position note
      const streetPosNote = getStreetPositionNote(playerPos, street);
      html += `<div class="review-street">
        <div class="review-street-title">${streetNames[street] || street}</div>
        <div class="review-position"><span class="pos-name">${playerPos}</span> — ${streetPosNote}</div>`;
      for (const log of streetLogs) {
        const actionLabel = { raise: '加注', call: '跟注', fold: '弃牌', check: '看牌', allin: '全下' }[log.action] || log.action;
        const badgeClass = `badge-${log.action}`;
        const amountStr = (log.action === 'raise' || log.action === 'call' || log.action === 'allin') && log.amount > 0
          ? ` ${log.amount}` : '';
        html += `<div class="review-action-row">
          <div>
            <span class="review-action-badge ${badgeClass}">${actionLabel}${amountStr}</span>
            <span style="font-size:11px;color:#78909c">底池: ${log.pot}</span>
          </div>
          ${log.reasoning ? `<div class="review-reasoning">${log.reasoning}</div>` : ''}
          ${log.handStrength > 0 ? `<div class="review-strength">手牌强度: ${log.handStrength}%</div>` : ''}
        </div>`;
      }
      html += `</div>`;
    }

    // Style consistency block
    const consistency = calcStyleConsistency(styleKey, logs);
    if (consistency) {
      const { score, styleName: sn, remarks, summary } = consistency;
      const scoreClass = score >= 80 ? 'green' : score >= 50 ? 'yellow' : 'red';
      const barColor = score >= 80 ? '#81c784' : score >= 50 ? '#ffb74d' : '#e57373';
      const remarksHTML = remarks.length > 0
        ? remarks.map(r => `<div style="margin-bottom:3px">• ${r}</div>`).join('')
        : '';
      html += `<div class="review-consistency">
        <h4>风格一致性分析</h4>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span style="font-size:13px;color:#b0bec5">风格: <strong style="color:#90caf9">${sn}</strong></span>
          <span class="consistency-score ${scoreClass}">${score}%</span>
        </div>
        <div class="consistency-bar-bg">
          <div class="consistency-bar-fill" style="width:${score}%;background:${barColor};"></div>
        </div>
        <div class="consistency-detail">
          ${remarksHTML}
          <div style="margin-top:4px;color:#cfd8dc">${summary}</div>
        </div>
      </div>`;
    }
  }

  document.getElementById('review-modal-content').innerHTML = html;
  document.getElementById('review-modal').classList.add('show');
  initReviewChat(seatIdx);
}

function closeReviewPanel() {
  document.getElementById('review-modal').classList.remove('show');
}

let reviewChatCtx = null; // 当前复盘上下文

function initReviewChat(seatIdx) {
  const p = G.players[seatIdx];
  const logs = actionLog.filter(l => l.playerId === seatIdx);
  reviewChatCtx = {
    seatIdx,

  const greeting = `我是 AI 教练。当前复盘对象：${p.name}，${styleDesc}，位置 ${p.position || '?'}。本手牌共记录了 ${logs.length} 条操作。你可以问我任何关于他打法的问题！`;

}

function sendChatShortcut(text) {
  const input = document.getElementById('review-chat-input');
  if (input) input.value = text;
  sendChatMessage();
}

function sendChatMessage() {
  const input = document.getElementById('review-chat-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text || !reviewChatCtx) return;
  input.value = '';
  appendUserBubble(text);
  // 显示打字动画
  const typingId = appendTypingIndicator();
  safeTimeout(() => {
    removeTypingIndicator(typingId);
    const answer = generateChatAnswer(text, reviewChatCtx);
    appendCoachBubble(answer);
  }, 500);
}

function appendUserBubble(text) {
  const hist = document.getElementById('review-chat-history');

  const hist = document.getElementById('review-chat-history');

  const wrap = document.createElement('div');
  wrap.className = 'chat-bubble-wrap coach';
  wrap.id = id;

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- 核心：规则问答引擎 ----
function generateChatAnswer(question, ctx) {
  const q = question.toLowerCase();
  const { player: p, logs, communityCards, pot, allPlayers, humanCards } = ctx;
  const styleKey = p.styleKey || '';
  const styleObj = p.style || {};
  const pos = p.position || '?';
  const styleName = styleObj.name || styleKey;

  // 公共牌描述
  const boardStr = communityCards.length > 0
    ? communityCards.map(c => c.rank + c.suit).join(' ')
    : '（翻牌前结束）';

  // 对手手牌
  const holeStr = p.cards && p.cards.length === 2
    ? p.cards.map(c => c.rank + c.suit).join(' ')
    : '未知';

  // 人类手牌
  const humanStr = humanCards && humanCards.length === 2
    ? humanCards.map(c => c.rank + c.suit).join(' ')
    : '未知';

  // 分街行动摘要
  const streetOrder = ['preflop', 'flop', 'turn', 'river'];
  const streetNames = { preflop: '翻牌前', flop: '翻牌圈', turn: '转牌圈', river: '河牌圈' };

  function actionSummary() {
    if (logs.length === 0) return '本手牌无行动记录。';
    const parts = [];
    for (const s of streetOrder) {
      const sl = logs.filter(l => l.street === s);
      if (sl.length === 0) continue;
      const desc = sl.map(l => {
        const label = { raise:'加注', call:'跟注', fold:'弃牌', check:'看牌', allin:'全下' }[l.action] || l.action;
        return l.amount > 0 ? `${label}${l.amount}` : label;
      }).join('→');
      parts.push(`${streetNames[s]}：${desc}`);
    }
    return parts.join('；');
  }

  function latestAction() {
    return logs.length > 0 ? logs[logs.length - 1] : null;
  }

  function findKeyAction() {
    // 找最激进的一个行动
    const aggressive = logs.filter(l => l.action === 'raise' || l.action === 'allin');
    if (aggressive.length > 0) return aggressive[aggressive.length - 1];
    return logs[logs.length - 1] || null;
  }

  // ---- "为什么" 类 ----
  if (/为什么|为何|原因|怎么会|凭什么/.test(q)) {
    const key = findKeyAction() || latestAction();
    if (!key) return `${p.name} 本手牌没有记录到明显的行动，可能在翻牌前就弃牌了。`;
    const actionLabel = { raise:'加注', call:'跟注', fold:'弃牌', check:'看牌', allin:'全下' }[key.action] || key.action;
    const streetLabel = streetNames[key.street] || key.street;
    const reasons = [];
    // 手牌强度
    if (key.handStrength >= 65) reasons.push(`手牌强度高达 ${key.handStrength}%，属于强牌范围`);
    else if (key.handStrength >= 45) reasons.push(`手牌强度约 ${key.handStrength}%，属于中等牌力`);
    else if (key.handStrength > 0) reasons.push(`手牌强度仅 ${key.handStrength}%，属于偏弱牌力`);
    // 风格
    if ((key.action === 'raise' || key.action === 'allin') && styleObj.AF >= 4) {
      reasons.push(`${styleName} 风格激进系数 AF=${styleObj.AF}，倾向用加注施压`);
    }
    if (key.action === 'raise' && styleObj.CBet >= 65) {
      reasons.push(`该风格 CBet 频率 ${styleObj.CBet}%，翻后主动继续下注是其标准线路`);
    }
    if (key.action === 'fold' && styleObj.FoldTo3Bet >= 60) {
      reasons.push(`该风格面对 3-bet 弃牌率 ${styleObj.FoldTo3Bet}%，在手牌不够强时倾向弃牌保守`);
    }
    // 位置
    const ipPositions = ['BTN','CO','CO+1'];
    if (ipPositions.includes(pos) && (key.action === 'raise' || key.action === 'allin')) {
      reasons.push(`${pos} 位置占据信息优势（IP），适合主动施压`);
    }
    const oopPositions = ['SB','BB','UTG','UTG+1'];
    if (oopPositions.includes(pos) && key.action === 'check') {
      reasons.push(`${pos} 位置翻后 OOP，选择过牌控制底池是合理策略`);
    }
    // 底池
    if (key.pot > 0) reasons.push(`当时底池为 ${key.pot}，下注具备足够价值`);

    const reasonText = reasons.length > 0 ? reasons.join('；') + '。' : key.reasoning || '综合考量了手牌强度和风格特征。';
    return `在${streetLabel}，${p.name} 选择了<strong>${actionLabel}</strong>（手牌：${holeStr}，公共牌：${boardStr}）。<br><br>原因分析：${reasonText}<br><br>完整逻辑：${key.reasoning || '暂无详细记录'}`;
  }

  // ---- "范围" 类 ----
  if (/范围|range|手牌组合|哪些牌|什么牌/.test(q)) {
    const pfLog = logs.find(l => l.street === 'preflop');
    const vpip = styleObj.VPIP || 25;
    const pfr = styleObj.PFR || 15;
    let rangeDesc = '';
    if (vpip <= 15) rangeDesc = '超紧范围（约 top 12-15%）：AA/KK/QQ/JJ/AKs/AKo 等高端手牌';
    else if (vpip <= 22) rangeDesc = '紧凶范围（约 top 18-22%）：AA-TT，AK/AQ/AJs，KQs 等';
    else if (vpip <= 30) rangeDesc = '均衡范围（约 top 25-30%）：AA-77，AK-AJ，KQs/KJs，各类同花接顺';
    else if (vpip <= 40) rangeDesc = '松凶范围（约 top 30-40%）：AA-55，所有 AX suited，KX/QX suited，多数同花接顺';
    else rangeDesc = '超松范围（50%+ 手牌）：几乎所有对子，A和K高牌，大量同花和接顺组合';

    // 如果翻牌前有激进行动，说明在该范围顶端
    const pfAggressive = pfLog && (pfLog.action === 'raise' || pfLog.action === 'allin');
    const rangeNote = pfAggressive
      ? `由于翻牌前选择了加注，实际手牌应在其 PFR 范围（约 ${pfr}%）内，即更偏向强牌端。`
      : pfLog && pfLog.action === 'call'
        ? `翻牌前选择了跟注，手牌可能处于 VPIP 中偏弱区域，实际牌面 ${holeStr} 可佐证。`
        : '';

    const postflopNote = logs.filter(l => l.street !== 'preflop').length > 0
      ? `翻后行动（${actionSummary()}）进一步缩小了他的范围，激进行动代表价值牌/强诈唬，被动行动代表控池或弱牌。`
      : '';

    return `<strong>${p.name}</strong> 是 ${styleName} 风格，VPIP ${vpip}%，PFR ${pfr}%。<br><br>翻牌前进牌范围：${rangeDesc}。<br><br>${rangeNote}${rangeNote ? '<br><br>' : ''}${postflopNote}${postflopNote ? '<br><br>' : ''}实际手牌为：<strong>${holeStr}</strong>，公共牌：${boardStr}。`;
  }

  // ---- "应该/怎么做/如何应对" 类 ----
  if (/应该|怎么|如何应对|对策|反制|我该|建议|怎样/.test(q)) {
    const aggrActions = logs.filter(l => l.action === 'raise' || l.action === 'allin');
    const passiveActions = logs.filter(l => l.action === 'call' || l.action === 'check');

    const counterTips = [];

    if (styleObj.AF >= 4) {
      counterTips.push('该玩家激进（AF ' + styleObj.AF + '），面对其加注应收紧跟注范围，只用强牌/强听牌跟注或 3-bet');
    }
    if (styleObj.CBet >= 70) {
      counterTips.push(`CBet 频率高（${styleObj.CBet}%），可以用浮牌（float）策略跟注翻牌后在转牌接管主动权`);
    }
    if (styleObj.FoldTo3Bet >= 60) {
      counterTips.push(`面对 3-bet 弃牌率高（${styleObj.FoldTo3Bet}%），你可以对他多用 3-bet 挤压，尤其在有利位置`);
    }
    if (styleObj.VPIP >= 40) {
      counterTips.push(`进牌率高（VPIP ${styleObj.VPIP}%），他牌面较宽，成牌强度未必高，可以在强牌时价值加注获利`);
    }
    if (styleObj.PFR <= 12 && styleObj.VPIP >= 30) {
      counterTips.push(`PFR 低但 VPIP 高（跟注为主），翻牌后遇到他跟注可放大下注，弱牌时不要轻易诈唬`);
    }

    const ipNote = ['BTN','CO'].includes(pos)
      ? `他处于 IP（${pos}），OOP 对局时应减少单调的过牌，利用 c-bet 主动施压。`
      : `他处于 OOP（${pos}），你有位置优势，可以适当浮牌、IP 控制底池。`;

    const humanHandNote = humanStr !== '未知' ? `你的手牌是 ${humanStr}，结合对手打法，注意保持 SPR 在合理范围内。` : '';

    const tips = counterTips.length > 0 ? counterTips.map(t => `• ${t}`).join('<br>') : '• 保持基本的紧凶策略，根据牌面灵活调整。';

    return `对阵 <strong>${p.name}（${styleName}）</strong> 的应对策略：<br><br>${tips}<br><br>${ipNote}${humanHandNote ? '<br>' + humanHandNote : ''}`;
  }

  // ---- "概率/胜率/EV" 类 ----
  if (/概率|胜率|赔率|ev|期望|equity|胜算/.test(q)) {
    let equityNote = '';
    if (p.cards && p.cards.length === 2 && communityCards.length >= 3) {
      const bestHand = getBestHand(p.cards, communityCards);
      equityNote = `${p.name} 的最终成牌为<strong>${bestHand.name}</strong>（${holeStr} 配合公共牌 ${boardStr}）。`;
    } else if (p.cards && p.cards.length === 2) {
      equityNote = `手牌 ${holeStr}，翻牌前阶段。`;
    }
    const avgStrength = logs.length > 0
      ? Math.round(logs.reduce((s, l) => s + (l.handStrength || 0), 0) / logs.length)
      : 0;
    const potOddsNote = pot > 0 ? `本手底池为 ${pot}。` : '';
    const evNote = avgStrength > 0
      ? `${p.name} 在各行动节点的平均手牌强度为 ${avgStrength}%，${avgStrength >= 60 ? '属于较强范围，大多数加注具备正期望值' : avgStrength >= 40 ? '属于中等范围，部分行动可能为半诈唬' : '手牌偏弱，部分行动可能是纯诈唬或风格导致的宽范围下注'}。` : '';
    return `${equityNote}${potOddsNote ? '<br>' + potOddsNote : ''}<br><br>${evNote}<br><br>注意：精确 EV 计算需要完整的范围对抗分析，以上为基于手牌强度的估算。`;
  }

  // ---- "风格" 类 ----
  if (/风格|打法|特点|习惯|套路|类型/.test(q)) {
    const styleDetailMap = {
      TAG:      '紧凶（TAG）：只进约 20% 的手牌，进了就加注。翻后主动 CBet，用强牌打大底池。应对：不要轻易跟注，遇到他的加注需要强牌才能续战。',
      LAG:      '松凶（LAG）：进约 35% 手牌并大量加注。利用宽范围施压，经常诈唬。应对：用强牌大注对付他，不要被他的加注吓倒，适当浮牌反制。',
      Rock:     '超紧（Rock）：进牌极少（约 12%），只玩 premium 手牌。翻后打法直接。应对：见到他加注直接弃牌，除非你手持 AA/KK 级别。',
      CS:       '松被动（CS/跟注站）：进牌多但少加注，喜欢跟注。翻后偏保守。应对：有强牌就大注，不要诈唬，他会一路跟到底。',
      Maniac:   '狂人（Maniac）：大量加注诈唬，VPIP 和 PFR 都极高。应对：耐心等待强牌，让他自己过度下注，用 call 和 check-raise 慢玩。',
      Balanced: '均衡（Balanced）：GTO 倾向，范围均衡，难以被读牌。应对：注重基本面，不要尝试花哨策略，按赔率决策。',
      Aggro:    '激进（Aggro）：大量 3-bet 和加注，AF 极高。应对：收紧 4-bet 范围，利用他的激进在强牌时陷阱他。',
      Passive:  '被动（Passive）：进牌率可以，但几乎不主动加注。应对：控制底池大小，强牌主动下注，不要等他带领。',
    };
    const detail = styleDetailMap[styleKey] || `${styleName} 风格：VPIP ${styleObj.VPIP || '?'}%，PFR ${styleObj.PFR || '?'}%，AF ${styleObj.AF || '?'}。`;
    const handNote = `本手牌他的行动：${actionSummary()}，手牌为 ${holeStr}。`;
    return `<strong>${p.name} 的风格解析：</strong><br><br>${detail}<br><br>${handNote}`;
  }

  // ---- "关键转折点" 类 ----
  if (/关键|转折|转折点|最重要|决定性|失误|错误/.test(q)) {
    const pivots = [];
    // 翻牌前加注是否激进
    const pfRaise = logs.find(l => l.street === 'preflop' && (l.action === 'raise' || l.action === 'allin'));
    if (pfRaise) {
      pivots.push(`翻牌前${pfRaise.action === 'allin' ? '全下' : '加注'}（手牌强度 ${pfRaise.handStrength}%）是定下基调的关键决策，奠定了本手牌的主动权。`);
    }
    // 翻后第一次加注
    const postRaise = logs.find(l => l.street !== 'preflop' && (l.action === 'raise' || l.action === 'allin'));
    if (postRaise) {
      const boardAtThat = communityCards.slice(0, postRaise.street === 'flop' ? 3 : postRaise.street === 'turn' ? 4 : 5);
      const boardDesc = boardAtThat.map(c => c.rank + c.suit).join(' ');
      pivots.push(`${streetNames[postRaise.street] || postRaise.street}的${postRaise.action === 'allin' ? '全下' : '加注'}（底池 ${postRaise.pot}，公共牌 ${boardDesc}）是翻后最关键节点。`);
    }
    // 弃牌
    const foldAct = logs.find(l => l.action === 'fold');
    if (foldAct) {
      pivots.push(`在${streetNames[foldAct.street] || foldAct.street}的弃牌终结了本手牌，放弃了底池 ${foldAct.pot}。`);
    }
    if (pivots.length === 0) {
      pivots.push('本手牌行动较少，翻牌前可能已经结束（弃牌或未入池）。');
    }
    return `<strong>本手牌关键转折点：</strong><br><br>${pivots.map((t,i) => `${i+1}. ${t}`).join('<br>')}<br><br>完整行动线路：${actionSummary()}`;
  }

  // ---- 通用兜底：综合分析 ----
  const bestHandFinal = p.cards && p.cards.length === 2 && communityCards.length >= 3
    ? getBestHand(p.cards, communityCards).name : null;

  return `<strong>${p.name} 本手牌综合分析：</strong><br><br>
风格：${styleName}（VPIP ${styleObj.VPIP || '?'}%，PFR ${styleObj.PFR || '?'}%，AF ${styleObj.AF || '?'}）<br>
位置：${pos}（${['BTN','CO','CO+1'].includes(pos) ? '有利位置 IP' : ['SB','BB','UTG','UTG+1'].includes(pos) ? '不利位置 OOP' : '中性位置'}）<br>
手牌：${holeStr}${bestHandFinal ? '，最终成牌：' + bestHandFinal : ''}<br>
公共牌：${boardStr}<br>
行动路线：${actionSummary()}<br><br>
你可以针对某个具体街道或动作提问，例如"为什么他在转牌圈加注？"或"他的范围是什么？"`;
}

// ============ 初始化 ============
function init() {
  G.players = createPlayers();
  renderAll();
  document.getElementById('action-title').textContent = '点击"新一局"开始游戏';
  document.getElementById('action-buttons').innerHTML =
    '<button class="action-btn btn-new" onclick="startNewHand()">开始新一局</button>';
  logMsg('欢迎来到德州扑克训练器！');
  logMsg('9人桌 | 盲注 50/100 | 初始筹码 10000');
  logMsg('右侧教练面板会实时提供建议。');
  updateCoach();
}

// ============ 移动端横屏检测 & 教练抽屉 ============
function checkOrientation() {
  try { screen.orientation.lock('landscape').catch(()=>{}); } catch(e) {}
}

function toggleCoachDrawer() {
  const panel = document.getElementById('coach-panel');
  const btn = document.getElementById('coach-toggle-btn');
  const isOpen = panel.classList.toggle('drawer-open');
  btn.textContent = isOpen ? '收起' : 'AI教练';
  btn.style.writingMode = isOpen ? 'horizontal-tb' : 'vertical-rl';
}

// Close drawer when clicking outside of it on mobile
document.addEventListener('click', function(e) {
  const panel = document.getElementById('coach-panel');
  const btn = document.getElementById('coach-toggle-btn');
  if (panel.classList.contains('drawer-open') &&
      !panel.contains(e.target) &&
      e.target !== btn) {
    panel.classList.remove('drawer-open');
    btn.textContent = 'AI教练';
    btn.style.writingMode = 'vertical-rl';
  }
});

window.addEventListener('orientationchange', checkOrientation);
window.addEventListener('resize', checkOrientation);


window.addEventListener('load', init);
window.addEventListener('load', checkOrientation);
</script>
