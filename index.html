<!-- 德州扑克训练App - index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>德州扑克训练器</title>
<style>
/* ============================================================
   POKER TRAINER — PREMIUM UI THEME
   Deep green felt + gold accents + glass panels
   ============================================================ */
:root {
  --felt-dark:   #0a3d1f;
  --felt-mid:    #0d5c2e;
  --felt-light:  #1a7a3e;
  --wood-dark:   #2c1a0e;
  --wood-mid:    #5c3317;
  --wood-light:  #8b5a2b;
  --gold:        #d4a843;
  --gold-bright: #f5cc6a;
  --gold-dim:    #a07830;
  --bg-deep:     #0d0d1a;
  --bg-dark:     #12122a;
  --bg-panel:    #161630;
  --bg-card:     #1c1c38;
  --border-dim:  #2a2a50;
  --border-mid:  #3a3a6a;
  --text-main:   #dde4ff;
  --text-muted:  #8890b8;
  --text-dim:    #555880;
  --blue-chip:   #5aa8f8;
  --green-win:   #5ecb7a;
  --red-lose:    #e85555;
  --orange-raise:#f07a20;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: radial-gradient(ellipse at 30% 20%, #1a1040 0%, var(--bg-deep) 60%);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ============================================================
   LEFT STATS PANEL
   ============================================================ */
#stats-panel {
  width: 170px;
  min-width: 170px;
  background: linear-gradient(180deg, #131330 0%, var(--bg-panel) 100%);
  border-right: 1px solid var(--border-dim);
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  overflow-y: auto;
}

.stat-box {
  background: linear-gradient(135deg, rgba(30,30,60,0.9), rgba(20,20,45,0.9));
  border: 1px solid var(--border-dim);
  border-radius: 10px;
  padding: 8px 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: border-color 0.2s;
}

.stat-box:hover { border-color: var(--border-mid); }

.stat-box h3 {
  font-size: 10px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 7px;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(212,168,67,0.2);
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 3px;
}

.stat-label { font-size: 11px; color: var(--text-muted); }
.stat-value {
  font-size: 12px;
  font-weight: 700;
  color: var(--blue-chip);
  font-variant-numeric: tabular-nums;
}
.stat-value.green { color: var(--green-win); }
.stat-value.red   { color: var(--red-lose); }
.stat-value.yellow{ color: var(--gold-bright); }

/* ============================================================
   MAIN TABLE AREA
   ============================================================ */
#main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 10px 5px 5px 5px;
  min-width: 0;
}

#table-container {
  position: relative;
  width: 680px;
  height: 400px;
  flex-shrink: 0;
}

/* Wood rail — outer ring */
#table-container::before {
  content: '';
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 548px; height: 308px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 50% 30%,
    #a06828 0%, #6b3e12 40%, #3d2008 100%);
  box-shadow:
    0 0 0 4px #241006,
    0 8px 40px rgba(0,0,0,0.9),
    inset 0 2px 6px rgba(255,200,100,0.15),
    inset 0 -4px 12px rgba(0,0,0,0.6);
  z-index: 0;
}

#poker-table {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 520px; height: 280px;
  background:
    radial-gradient(ellipse at 50% 35%,
      #1e7a40 0%, #115c28 45%, #0a3d1a 100%);
  border-radius: 50%;
  border: none;
  box-shadow:
    inset 0 4px 20px rgba(0,0,0,0.6),
    inset 0 -4px 16px rgba(0,0,0,0.4),
    inset 0 0 60px rgba(0,0,0,0.3);
  z-index: 1;
}

/* Inner felt edge highlight */
.table-felt-line {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 484px; height: 244px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
  pointer-events: none;
  z-index: 2;
}

/* ============================================================
   POT & COMMUNITY CARDS
   ============================================================ */
#pot-display {
  position: absolute;
  left: 50%; top: 26%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 10;
}

#pot-display .pot-label {
  font-size: 10px;
  color: rgba(212,168,67,0.6);
  text-transform: uppercase;
  letter-spacing: 1px;
}

#pot-display .pot-amount {
  font-size: 20px;
  font-weight: 800;
  color: var(--gold-bright);
  text-shadow: 0 0 12px rgba(245,204,106,0.7), 0 0 24px rgba(245,204,106,0.3);
  font-variant-numeric: tabular-nums;
}

#community-cards {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  gap: 7px;
  z-index: 10;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
}

#street-display {
  position: absolute;
  left: 50%; bottom: 16%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(212,168,67,0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
  z-index: 10;
}

/* ============================================================
   PLAYING CARDS
   ============================================================ */
.card {
  width: 44px; height: 62px;
  background: linear-gradient(160deg, #ffffff 0%, #f0f0f0 100%);
  border-radius: 7px;
  border: 1px solid rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 800;
  box-shadow:
    2px 3px 8px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.9);
  position: relative;
  color: #1a1a1a;
  flex-shrink: 0;
  user-select: none;
  transition: transform 0.15s, box-shadow 0.15s;
}

.card.red { color: #cc1111; }

.card.back {
  background: linear-gradient(135deg, #1a3a7a 0%, #0d2357 50%, #1a3a7a 100%);
  border-color: #2a4d9e;
}

.card.back::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  background:
    repeating-linear-gradient(45deg,
      transparent, transparent 3px,
      rgba(255,255,255,0.04) 3px, rgba(255,255,255,0.04) 6px),
    repeating-linear-gradient(-45deg,
      transparent, transparent 3px,
      rgba(255,255,255,0.02) 3px, rgba(255,255,255,0.02) 6px);
}

.card.small {
  width: 34px; height: 48px;
  font-size: 12px;
  border-radius: 5px;
}

.card.ghost {
  background: rgba(255,255,255,0.04);
  border: 1px dashed rgba(255,255,255,0.12);
  box-shadow: none;
}

.card-rank { line-height: 1; }
.card-suit { line-height: 1; font-size: 13px; }

/* ============================================================
   SEATS
   ============================================================ */
.seat {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 20;
}

.seat-info {
  background: linear-gradient(160deg, rgba(22,25,55,0.96), rgba(14,16,38,0.96));
  border: 1.5px solid var(--border-dim);
  border-radius: 12px;
  padding: 4px 8px;
  text-align: center;
  min-width: 82px;
  cursor: default;
  transition: border-color 0.25s, box-shadow 0.25s, filter 0.25s;
  box-shadow: 0 3px 12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
  backdrop-filter: blur(4px);
}

/* Active player: gold breathing glow */
.seat-info.active {
  border-color: var(--gold);
  box-shadow:
    0 0 0 1px rgba(212,168,67,0.4),
    0 0 16px rgba(212,168,67,0.5),
    0 3px 12px rgba(0,0,0,0.6);
  animation: breatheGold 2s ease-in-out infinite;
}

@keyframes breatheGold {
  0%,100% { box-shadow: 0 0 0 1px rgba(212,168,67,0.4), 0 0 12px rgba(212,168,67,0.4), 0 3px 12px rgba(0,0,0,0.6); }
  50%      { box-shadow: 0 0 0 2px rgba(212,168,67,0.6), 0 0 22px rgba(212,168,67,0.65), 0 3px 12px rgba(0,0,0,0.6); }
}

.seat-info.folded {
  filter: grayscale(0.8) brightness(0.5);
  opacity: 0.55;
}

.seat-info.dealer  { border-color: #e05a5a; box-shadow: 0 0 10px rgba(224,90,90,0.35), 0 3px 12px rgba(0,0,0,0.6); }
.seat-info.winner  { border-color: var(--green-win); box-shadow: 0 0 16px rgba(94,203,122,0.6), 0 3px 12px rgba(0,0,0,0.6); }
.seat-info.human   { border-color: #6aacf5; box-shadow: 0 0 10px rgba(106,172,245,0.35), 0 3px 12px rgba(0,0,0,0.6); }

.seat-name { font-size: 11px; color: var(--text-main); font-weight: 600; }
.seat-name span { font-size: 9px; color: var(--text-dim); display: block; margin-top: 1px; }
.seat-chips {
  font-size: 12px;
  font-weight: 700;
  color: var(--blue-chip);
  font-variant-numeric: tabular-nums;
}
.seat-chips::before { content: '◎ '; font-size: 9px; color: var(--gold-dim); }
.seat-bet { font-size: 11px; color: var(--gold-bright); min-height: 14px; font-weight: 600; }
.seat-cards { display: flex; gap: 3px; margin-top: 3px; }

.dealer-btn {
  position: absolute;
  width: 22px; height: 22px;
  background: radial-gradient(circle at 40% 35%, var(--gold-bright), var(--gold));
  color: #1a0a00;
  border-radius: 50%;
  font-size: 9px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 30;
  box-shadow: 0 2px 6px rgba(0,0,0,0.6), 0 0 8px rgba(212,168,67,0.5);
  border: 1.5px solid rgba(255,255,255,0.3);
}

/* ============================================================
   ACTION BAR
   ============================================================ */
#action-bar {
  width: 100%;
  max-width: 680px;
  background: linear-gradient(160deg, rgba(20,22,48,0.97), rgba(13,14,32,0.97));
  border: 1px solid var(--border-dim);
  border-radius: 14px;
  padding: 10px 14px;
  margin-top: 8px;
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
}

#action-bar h3 {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

#action-buttons {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.action-btn {
  padding: 9px 20px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  min-width: 80px;
  position: relative;
  overflow: hidden;
  letter-spacing: 0.3px;
}

.action-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 50%);
  pointer-events: none;
  border-radius: 8px;
}

.action-btn:hover {
  transform: translateY(-2px) scale(1.03);
  filter: brightness(1.15);
}

.action-btn:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
.action-btn:active { transform: translateY(0) scale(0.98); }

.btn-fold  {
  background: linear-gradient(160deg, #cc2222, #8b0f0f);
  color: #fff;
  box-shadow: 0 3px 10px rgba(180,20,20,0.45);
}
.btn-fold:hover  { box-shadow: 0 6px 20px rgba(200,30,30,0.6); }

.btn-skip-end {
  background: linear-gradient(160deg, #1565c0, #0d47a1);
  color: #fff;
  box-shadow: 0 3px 14px rgba(21,101,192,0.55);
  font-size: 1.05em;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.btn-skip-end:hover { box-shadow: 0 6px 22px rgba(21,101,192,0.75); }

.btn-check {
  background: linear-gradient(160deg, #3a5070, #243448);
  color: #c8d8f0;
  box-shadow: 0 3px 10px rgba(30,50,80,0.5);
}
.btn-check:hover { box-shadow: 0 6px 20px rgba(50,90,140,0.5); }

.btn-call {
  background: linear-gradient(160deg, #1a6ec8, #0d4a8a);
  color: #fff;
  box-shadow: 0 3px 10px rgba(20,90,180,0.5);
}
.btn-call:hover  { box-shadow: 0 6px 20px rgba(30,110,220,0.6); }

.btn-raise {
  background: linear-gradient(160deg, var(--gold), var(--gold-dim));
  color: #1a0800;
  box-shadow: 0 3px 10px rgba(180,130,40,0.5);
}
.btn-raise:hover { box-shadow: 0 6px 20px rgba(212,168,67,0.6); }

.btn-allin {
  background: linear-gradient(160deg, #8822cc, #4a0a88);
  color: #fff;
  box-shadow: 0 3px 10px rgba(100,30,160,0.5);
}
.btn-allin:hover { box-shadow: 0 6px 20px rgba(140,40,200,0.6); }

.btn-next {
  background: linear-gradient(160deg, #22aa50, #126628);
  color: #fff;
  box-shadow: 0 3px 10px rgba(30,140,60,0.5);
}
.btn-next:hover  { box-shadow: 0 6px 20px rgba(40,180,80,0.55); }

.btn-new {
  background: linear-gradient(160deg, #0d9e7a, #075c48);
  color: #fff;
  box-shadow: 0 3px 10px rgba(10,130,100,0.5);
}
.btn-new:hover   { box-shadow: 0 6px 20px rgba(20,180,140,0.55); }

#raise-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 4px;
}

/* Styled range slider */
#raise-slider {
  width: 120px;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: linear-gradient(90deg, var(--gold) var(--val, 50%), var(--border-dim) var(--val, 50%));
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}
#raise-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, var(--gold-bright), var(--gold));
  box-shadow: 0 1px 6px rgba(0,0,0,0.5), 0 0 8px rgba(212,168,67,0.4);
  border: 2px solid rgba(255,255,255,0.2);
  cursor: pointer;
}
#raise-slider::-moz-range-thumb {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--gold);
  border: 2px solid rgba(255,255,255,0.2);
  cursor: pointer;
}

#raise-amount-display {
  font-size: 14px;
  color: var(--gold-bright);
  font-weight: 800;
  min-width: 60px;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 8px rgba(245,204,106,0.5);
}

.raise-preset {
  padding: 4px 9px;
  font-size: 11px;
  background: linear-gradient(160deg, rgba(50,55,90,0.9), rgba(30,35,65,0.9));
  color: var(--text-muted);
  border: 1px solid var(--border-dim);
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 600;
}
.raise-preset:hover {
  background: linear-gradient(160deg, rgba(70,75,120,0.9), rgba(50,55,100,0.9));
  border-color: var(--gold-dim);
  color: var(--gold-bright);
}

#action-msg {
  margin-top: 6px;
  font-size: 12px;
  color: var(--green-win);
  min-height: 16px;
  font-weight: 500;
}

/* ============================================================
   COACH PANEL
   ============================================================ */
#coach-panel {
  width: 220px;
  min-width: 220px;
  background: linear-gradient(180deg, #111130 0%, var(--bg-panel) 100%);
  border-left: 1px solid var(--border-dim);
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  overflow-y: auto;
}

#coach-panel h2 {
  font-size: 13px;
  color: var(--gold-bright);
  text-align: center;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(212,168,67,0.2);
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(245,204,106,0.4);
}

.coach-box {
  background: linear-gradient(135deg, rgba(26,28,60,0.95), rgba(16,18,42,0.95));
  border: 1px solid var(--border-dim);
  border-radius: 10px;
  padding: 8px 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
  backdrop-filter: blur(4px);
}

.coach-box h4 {
  font-size: 10px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 7px;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(212,168,67,0.15);
}

.equity-bar-bg {
  background: rgba(0,0,0,0.4);
  border-radius: 6px;
  height: 12px;
  overflow: hidden;
  margin-bottom: 4px;
  border: 1px solid var(--border-dim);
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}

.equity-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--felt-mid), var(--green-win));
  border-radius: 6px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 6px rgba(94,203,122,0.4);
}

.equity-pct {
  font-size: 22px;
  font-weight: 800;
  color: var(--green-win);
  text-align: center;
  text-shadow: 0 0 12px rgba(94,203,122,0.5);
  font-variant-numeric: tabular-nums;
}

.ev-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.ev-row:last-child { border-bottom: none; }
.ev-action { font-size: 12px; color: var(--text-muted); }
.ev-value { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
.ev-value.pos     { color: var(--green-win); text-shadow: 0 0 8px rgba(94,203,122,0.4); }
.ev-value.neg     { color: var(--red-lose); }
.ev-value.neutral { color: var(--text-dim); }
.ev-best { font-size: 10px; color: var(--gold-bright); margin-left: 4px; }

.coach-advice {
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-main);
}
.coach-advice .highlight { color: var(--gold-bright); font-weight: 700; }
.coach-advice .good      { color: var(--green-win); }
.coach-advice .bad       { color: var(--red-lose); }

.pos-box { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
.pos-label { font-weight: 700; color: var(--blue-chip); }

.opp-row {
  font-size: 11px;
  color: var(--text-muted);
  padding: 3px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.opp-row:last-child { border-bottom: none; }

.opp-style-tag {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 10px;
  margin-left: 4px;
  font-weight: 600;
}

.tag-TAG      { background: rgba(21,101,192,0.7);  color: #90caf9; }
.tag-LAG      { background: rgba(106,27,154,0.7);  color: #ce93d8; }
.tag-Rock     { background: rgba(55,71,79,0.7);    color: #b0bec5; }
.tag-CS       { background: rgba(27,94,32,0.7);    color: #a5d6a7; }
.tag-Maniac   { background: rgba(183,28,28,0.7);   color: #ef9a9a; }
.tag-Balanced { background: rgba(0,77,64,0.7);     color: #80cbc4; }
.tag-Aggro    { background: rgba(230,81,0,0.7);    color: #ffcc80; }
.tag-Passive  { background: rgba(78,52,46,0.7);    color: #bcaaa4; }

/* ============================================================
   AVATAR
   ============================================================ */
.avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  margin-bottom: 2px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
  transition: border-color 0.25s, box-shadow 0.25s;
}

.seat-info.active .avatar {
  border-color: var(--gold);
