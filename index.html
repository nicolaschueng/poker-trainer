// ============ 牌组系统 ============
function createDeck() {
  const deck = [];
  for (const suit of SUITS) for (const rank of RANKS) deck.push({ rank, suit });
  return deck;
}
function shuffleDeck(deck) {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}
function cardHTML(card, small=false, facedown=false) {
  if (facedown) return `<div class="card${small?' small':''} back card-deal"></div>`;
  if (!card) return `<div class="card${small?' small':''} ghost"></div>`;
  const isRed = card.suit === '♥' || card.suit === '♦';
  return `<div class="card${small?' small':''} ${isRed?'red':''} card-deal">
    <div class="card-rank">${card.rank}</div>
    <div class="card-suit">${card.suit}</div>
  </div>`;
}

// ============ 手牌评估 ============
// Returns { rank: 0-8, name, tiebreakers: [] }
// 0=high card, 1=pair, 2=two pair, 3=three of a kind, 4=straight, 5=flush,
// 6=full house, 7=four of a kind, 8=straight flush / royal flush

function rankCards(cards) {
  // cards: array of {rank,suit}
  const vals = cards.map(c => RANK_VAL[c.rank]).sort((a,b) => b-a);
  const suits = cards.map(c => c.suit);
  const valCount = {};
  for (const v of vals) valCount[v] = (valCount[v]||0)+1;
  const counts = Object.entries(valCount).map(([v,c]) => [parseInt(v),c]).sort((a,b) => b[1]-a[1] || b[0]-a[0]);
  const isFlush = suits.every(s => s === suits[0]);
  // Straight check
  let straightHigh = 0;
  const uniqueVals = [...new Set(vals)].sort((a,b) => b-a);
  for (let i = 0; i <= uniqueVals.length - 5; i++) {
    if (uniqueVals[i] - uniqueVals[i+4] === 4 &&
        uniqueVals[i+1] - uniqueVals[i+2] === 1 &&
        uniqueVals[i+2] - uniqueVals[i+3] === 1 &&
        uniqueVals[i+3] - uniqueVals[i+4] === 1) {
      straightHigh = uniqueVals[i]; break;
    }
  }
  // Wheel: A-2-3-4-5
  if (!straightHigh && uniqueVals.includes(14) && uniqueVals.includes(2) && uniqueVals.includes(3) && uniqueVals.includes(4) && uniqueVals.includes(5)) straightHigh = 5;
  const isStraight = straightHigh > 0;
  const topCount = counts[0][1];
  const secondCount = counts.length > 1 ? counts[1][1] : 0;
  let handRank, handName, tb;
  if (isFlush && isStraight) {
    handRank = 8; handName = straightHigh === 14 ? '皇家同花顺' : '同花顺'; tb = [straightHigh];
  } else if (topCount === 4) {
    handRank = 7; handName = '四条'; tb = [counts[0][0], counts[1]?counts[1][0]:0];
  } else if (topCount === 3 && secondCount === 2) {
    handRank = 6; handName = '葫芦'; tb = [counts[0][0], counts[1][0]];
  } else if (isFlush) {
    handRank = 5; handName = '同花'; tb = vals.slice(0,5);
  } else if (isStraight) {
    handRank = 4; handName = '顺子'; tb = [straightHigh];
  } else if (topCount === 3) {
    handRank = 3; handName = '三条'; tb = [counts[0][0], ...vals.filter(v=>v!==counts[0][0]).slice(0,2)];
  } else if (topCount === 2 && secondCount === 2) {
    handRank = 2; handName = '两对'; tb = [counts[0][0], counts[1][0], vals.find(v=>v!==counts[0][0]&&v!==counts[1][0])||0];
  } else if (topCount === 2) {
    handRank = 1; handName = '一对'; tb = [counts[0][0], ...vals.filter(v=>v!==counts[0][0]).slice(0,3)];
  } else {
    handRank = 0; handName = '高牌'; tb = vals.slice(0,5);
  }
  return { rank: handRank, name: handName, tiebreakers: tb };
}

function getBestHand(holeCards, communityCards) {
  const all = [...holeCards, ...communityCards];
  if (all.length < 5) {
    // Preflop or flop with < 5: evaluate what we have
    if (all.length < 2) return { rank: -1, name: '--', tiebreakers: [] };
    return rankCards(all);
  }
  // Choose best 5 from all cards
  let best = null;
  function combos(arr, k) {
    if (k === 0) return [[]];
    if (arr.length === 0) return [];
    const [first, ...rest] = arr;
    return [...combos(rest, k-1).map(c => [first,...c]), ...combos(rest, k)];
  }
  for (const combo of combos(all, 5)) {
    const h = rankCards(combo);
    if (!best || compareHands(h, best) > 0) best = h;
  }
  return best;
}

function compareHands(a, b) {
  if (a.rank !== b.rank) return a.rank - b.rank;
  for (let i = 0; i < Math.max(a.tiebreakers.length, b.tiebreakers.length); i++) {
    const av = a.tiebreakers[i] || 0, bv = b.tiebreakers[i] || 0;
    if (av !== bv) return av - bv;
  }
  return 0;
}

// ============ 手牌强度 / 胜率估计 ============
function preflopKey(c1, c2) {
  const v1 = RANK_VAL[c1.rank], v2 = RANK_VAL[c2.rank];
  const high = v1 >= v2 ? c1 : c2;
  const low = v1 >= v2 ? c2 : c1;
  const suited = c1.suit === c2.suit;
  if (high.rank === low.rank) return high.rank + low.rank; // pair like 'AA'
  return high.rank + low.rank + (suited ? 's' : 'o');
}
function getPreflopStrength(c1, c2) {
  const key = preflopKey(c1, c2);
  if (PREFLOP_STRENGTH[key] !== undefined) return PREFLOP_STRENGTH[key];
  // Fallback estimation
  const v1 = RANK_VAL[c1.rank], v2 = RANK_VAL[c2.rank];
  const base = (v1 + v2) / 2 / 14;
  const suitBonus = c1.suit === c2.suit ? 0.03 : 0;
  const pairBonus = c1.rank === c2.rank ? 0.1 : 0;
  return Math.min(0.85, Math.max(0.25, base * 0.7 + suitBonus + pairBonus));
}

function estimateEquity(holeCards, communityCards, numOpponents) {
  // Monte Carlo simulation, light version
  if (communityCards.length === 0) {
    // Preflop: use lookup-based head-up equity, then scale for multiple opponents
    // PREFLOP_STRENGTH values are roughly calibrated vs random hand.
    // For HU equity we scale to [0.35, 0.85] range from the strength value.
    const strength = getPreflopStrength(holeCards[0], holeCards[1]);
    // Convert raw strength (0.32-0.85) to HU win equity (roughly linear):
    // strength=0.85 (AA) → ~85% HU equity
    // strength=0.67 (AKs) → ~66% HU equity
    // strength=0.32 (32s) → ~36% HU equity
    const huEquity = Math.min(0.88, Math.max(0.32, strength));
    if (numOpponents <= 0) return huEquity;
    // For multiple opponents: equity roughly = huEquity^(0.5 * numOpponents)
    // This gives: AKs vs 1 opp → 66%, vs 2 → 55%, vs 3 → 47%, vs 4 → 41%
    const adj = Math.pow(huEquity, 1 + (numOpponents - 1) * 0.45);
    return Math.max(0.15, adj);
  }
  // Post-flop: run simulations
  const usedCards = new Set([...holeCards, ...communityCards].map(c=>c.rank+c.suit));
  const deck = createDeck().filter(c => !usedCards.has(c.rank+c.suit));
  let wins = 0, total = 0;
  const simCount = 200;
  const boardNeeded = 5 - communityCards.length;
  for (let i = 0; i < simCount; i++) {
    // Random board completion
    const shuffled = [...deck].sort(() => Math.random() - 0.5);
    const boardComplete = [...communityCards, ...shuffled.slice(0, boardNeeded)];
    const oppCards = shuffled.slice(boardNeeded, boardNeeded + 2);
    if (oppCards.length < 2) continue;
    const myHand = getBestHand(holeCards, boardComplete);
    const oppHand = getBestHand(oppCards, boardComplete);
    const cmp = compareHands(myHand, oppHand);
    if (cmp > 0) wins++;
    else if (cmp === 0) wins += 0.5;
    total++;
  }
  const raw = total > 0 ? wins / total : 0.5;
  // Adjust for multiple opponents
  return Math.pow(raw, Math.max(1, numOpponents * 0.7));
}

// ============ AI玩家系统 ============
function createPlayers() {
  const players = [];
  const styleKeys = AI_STYLE_LIST.slice();
  // Shuffle styles for variety
  for (let i = styleKeys.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [styleKeys[i], styleKeys[j]] = [styleKeys[j], styleKeys[i]];
  }
  for (let i = 0; i < 9; i++) {
    if (i === HUMAN_SEAT) {
      players.push({ id: i, name: '你', chips: STARTING_CHIPS, isHuman: true, style: null,
        cards: [], bet: 0, totalBet: 0, folded: false, allin: false, acted: false, rebuys: 0 });
    } else {
      const styleKey = styleKeys[(i-1) % styleKeys.length];
      const style = AI_STYLES[styleKey];
      const aiNames = ['小红','阿杰','Lisa','老王','冰冰','小帅','甜甜','Queen'];
      players.push({ id: i, name: aiNames[i-1], chips: STARTING_CHIPS, isHuman: false,
        style: style, styleKey: styleKey,
        cards: [], bet: 0, totalBet: 0, folded: false, allin: false, acted: false, rebuys: 0 });
    }
  }
  return players;
}

// ============ 职业级AI决策引擎 ============

// 翻牌前起手牌分级
function getPreflopTier(c1, c2) {
  const v1 = RANK_VAL[c1.rank], v2 = RANK_VAL[c2.rank];
  const hi = Math.max(v1, v2), lo = Math.min(v1, v2);
  const suited = c1.suit === c2.suit;
  const isPair = v1 === v2;
  const hiR = RANKS[hi - 2], loR = RANKS[lo - 2];
  const key = isPair ? (hiR + hiR) : (hiR + loR + (suited ? 's' : 'o'));

  // Tier 1: Premium
  const t1 = new Set(['AA','KK','QQ','AKs']);
  // Tier 2: Strong
  const t2 = new Set(['JJ','TT','AKo','AQs','AQo']);
  // Tier 3: Playable
  const t3 = new Set(['99','88','77','AJs','ATs','KQs','KQo','AJo']);
  // Tier 4: Speculative
  const t4 = new Set([
    '66','55','44','33','22',
    'KJs','KTs','QJs','JTs','T9s','98s','87s','76s','65s',
    'A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s',
    'A9o'
  ]);
  // Tier 5: Marginal
  const t5 = new Set([
    'QTs','J9s','T8s','97s','86s','75s','64s','54s',
    'KJo','KTo','QJo',
    'K9s','K8s','K7s','K6s','K5s','K4s','K3s','K2s',
    'Q9s','Q8s','J8s','T7s','96s','85s','74s','63s','53s','43s'
  ]);

  if (t1.has(key)) return 1;
  if (t2.has(key)) return 2;
  if (t3.has(key)) return 3;
  if (t4.has(key)) return 4;
  if (t5.has(key)) return 5;
  return 6; // trash
}

// 位置权重（数字越小越好）
function positionRank(pos) {
  const order = { BTN: 0, CO: 1, 'CO+1': 2, 'MP+1': 3, MP: 4, 'UTG+1': 5, UTG: 6, BB: 7, SB: 8 };
  return order[pos] !== undefined ? order[pos] : 5;
}

function isLatePosition(pos) { return ['BTN','CO','CO+1'].includes(pos); }
function isEarlyPosition(pos) { return ['UTG','UTG+1'].includes(pos); }
function isMidPosition(pos) { return ['MP','MP+1'].includes(pos); }

// 牌面湿润度分析（0=干燥, 1=半湿, 2=湿润）
function analyzeBoardTexture(community) {
  if (community.length < 3) return { wetness: 0, paired: false, monotone: false, twoTone: false, hasAce: false, highCardCount: 0, suitedAceOnBoard: false, connected: false };
  // Use all community cards (up to 5) for texture
  const allVals = community.map(c => RANK_VAL[c.rank]);
  const allSuits = community.map(c => c.suit);
  // Flop-based suit analysis
  const flop = community.slice(0, 3);
  const flopSuits = flop.map(c => c.suit);
  const suitCounts = {};
  for (const s of allSuits) suitCounts[s] = (suitCounts[s] || 0) + 1;
  const flopSuitCounts = {};
  for (const s of flopSuits) flopSuitCounts[s] = (flopSuitCounts[s] || 0) + 1;
  const maxFlopSuit = Math.max(...Object.values(flopSuitCounts));
  const maxSuit = Math.max(...Object.values(suitCounts));
  const monotone = maxFlopSuit === 3;
  const twoTone = maxFlopSuit === 2 && !monotone;
  // Flush draw possible (4+ of same suit on board)
  const flushDrawOnBoard = maxSuit >= 4;
  const uniqueVals = [...new Set(allVals)];
  const flopVals = flop.map(c => RANK_VAL[c.rank]);
  const uniqueFlopVals = [...new Set(flopVals)];
  const paired = uniqueFlopVals.length < 3;
  // Connectivity check (flop)
  const sortedFlop = [...uniqueFlopVals].sort((a,b) => a - b);
  let connected = false;
  if (sortedFlop.length >= 2) {
    const gap = sortedFlop[sortedFlop.length-1] - sortedFlop[0];
    connected = gap <= 4;
  }
  // Has ace on board
  const hasAce = allVals.includes(14);
  // High card count (T+)
  const highCardCount = allVals.filter(v => v >= 10).length;
  // Suited ace on board: ace present AND flush draw possible
  const suitedAceOnBoard = hasAce && (monotone || twoTone || flushDrawOnBoard);
  let wetness = 0;
  if (twoTone) wetness++;
  if (monotone) wetness += 2;
  if (connected) wetness++;
  // Turn/river add extra wetness if they complete draws
  if (community.length >= 4 && flushDrawOnBoard) wetness++;
  const finalWetness = wetness >= 3 ? 2 : wetness >= 1 ? 1 : 0;
  return { wetness: finalWetness, paired, monotone, twoTone, connected, hasAce, highCardCount, suitedAceOnBoard, flushDrawOnBoard };
}

// 翻后手牌分类
function classifyPostflopHand(holeCards, community) {
  if (community.length < 3) return { category: 'unknown', label: '未知' };
  const hand = getBestHand(holeCards, community);
  if (!hand) return { category: 'unknown', label: '未知' };
  const r = hand.rank;
  const holeVals = holeCards.map(c => RANK_VAL[c.rank]);
  const boardVals = community.map(c => RANK_VAL[c.rank]).sort((a,b) => b-a);
  const topBoardCard = boardVals[0];
  const maxHole = Math.max(...holeVals);

  // Straight flush / quads / full house / flush / straight: nuts
  if (r >= 4) return { category: 'nuts', label: r === 8 ? '同花顺' : r === 7 ? '四条' : r === 6 ? '葫芦' : r === 5 ? '同花' : '顺子', handRank: r };

  if (r === 3) {
    // Three of a kind: distinguish set (pocket pair hits board) vs trips (board pair + kicker)
    const tripVal = hand.tiebreakers[0];
    const boardValCount = {};
    for (const v of boardVals) boardValCount[v] = (boardValCount[v] || 0) + 1;
    const boardPaired = boardVals.some(v => boardValCount[v] >= 2);
    // Set: both hole cards contribute (pocket pair matching one board card)
    const isSet = holeVals[0] === holeVals[1] && holeVals[0] === tripVal;
    if (isSet) return { category: 'nuts', label: '暗三条(set)', handRank: r };
    return { category: 'nuts', label: '三条', handRank: r };
  }

  if (r === 2) {
    // Two pair
    const topPair = hand.tiebreakers[0], secondPair = hand.tiebreakers[1];
    // If both pairs use hole cards → strong two pair
    const holeUsed = holeVals.filter(v => v === topPair || v === secondPair).length;
    if (holeUsed >= 2) return { category: 'nuts', label: '两对(双洞牌)', handRank: r };
    return { category: 'strong', label: '两对', handRank: r };
  }

  if (r === 1) {
    // One pair
    const pairVal = hand.tiebreakers[0];
    const usingHole = holeVals.includes(pairVal);
    if (!usingHole) {
      // Board pair — check over pair (both hole cards > top board pair)
      const minHole = Math.min(...holeVals);
      if (holeVals[0] === holeVals[1] && holeVals[0] > topBoardCard) {
        return { category: 'strong', label: '超顶对(overpair)', handRank: r };
      }
      return { category: 'weak', label: '公共牌对子', handRank: r };
    }
    // Over pair: pocket pair that beats all board cards
    if (holeVals[0] === holeVals[1] && holeVals[0] > topBoardCard) {
      return { category: 'strong', label: '超顶对(overpair)', handRank: r };
    }
    const kicker = hand.tiebreakers[1] || 0;
    const secondBoardCard = boardVals[1] || 0;
    // Top pair
    if (pairVal === topBoardCard) {
      if (kicker >= 11) return { category: 'strong', label: '顶对顶踢脚', handRank: r };
      return { category: 'medium', label: '顶对弱踢脚', handRank: r };
    }
    // Second pair
    if (pairVal === secondBoardCard) return { category: 'medium', label: '第二对', handRank: r };
    return { category: 'weak', label: '弱对子', handRank: r };
  }

  // High card — check draws
  if (r === 0) {
    const allCards = [...holeCards, ...community];
    const suitMap = {};
    for (const c of allCards) suitMap[c.suit] = (suitMap[c.suit] || 0) + 1;
    const maxSuitCount = Math.max(...Object.values(suitMap));
    if (maxSuitCount >= 4) {
      // Nut flush draw: hole card is Ace of dominant suit
      const domSuit = Object.keys(suitMap).find(s => suitMap[s] === maxSuitCount);
      const hasNutFD = holeCards.some(c => c.rank === 'A' && c.suit === domSuit);
      return { category: 'draw', label: hasNutFD ? '坚果同花听牌' : '同花听牌', handRank: r, nutDraw: hasNutFD };
    }
    // Straight draw
    const uVals = [...new Set(allCards.map(c => RANK_VAL[c.rank]))].sort((a,b) => a - b);
    let oesd = false, gutshot = false;
    for (let i = 0; i <= uVals.length - 4; i++) {
      const span = uVals[i+3] - uVals[i];
      if (span === 4) { oesd = true; break; }
      if (span === 5) gutshot = true;
    }
    if (oesd) return { category: 'draw', label: '两头顺子听牌', handRank: r };
    if (gutshot) return { category: 'draw_weak', label: '卡肚顺子听牌', handRank: r };
    if (maxHole === 14) return { category: 'weak', label: 'A高牌', handRank: r };
    return { category: 'air', label: '空气', handRank: r };
  }

  return { category: 'medium', label: '中等牌力', handRank: r };
}

// 计算底池赔率
function calcPotOdds(callAmt, pot) {
  if (callAmt <= 0) return 1;
  return callAmt / (pot + callAmt);
}

// 标准下注尺度
function sizeBet(pot, fraction) {
  return Math.max(BB_AMOUNT, Math.floor(pot * fraction));
}

function aiDecide(player, gameState) {
  const { street, pot, currentBet, players, communityCards, dealerPos } = gameState;
  const style = player.style;
  const styleKey = player.styleKey || 'Balanced';
  const callAmount = Math.max(0, currentBet - player.bet);
  const toCall = Math.min(callAmount, player.chips);
  const canCheck = callAmount === 0;

  // 获取该玩家位置
  const pos = player.position || 'MP';
  const latePos = isLatePosition(pos);
  const earlyPos = isEarlyPosition(pos);
  const midPos = isMidPosition(pos);

  // 统计活跃玩家
  const activePlayers = players.filter(p => !p.folded && !p.allin && p.id !== player.id);
  const totalActive = players.filter(p => !p.folded).length;

  // 随机数（0-1）
  const r = Math.random();
  const r2 = Math.random(); // 第二个随机数用于独立决策

  // =====================================================
  // PREFLOP 决策
  // =====================================================
  if (street === 'preflop') {
    const tier = getPreflopTier(player.cards[0], player.cards[1]);
    const cardDesc = player.cards.map(c => c.rank + c.suit).join('');

    // 牌面描述 helper
    const card1R = player.cards[0].rank, card2R = player.cards[1].rank;
    const isAA = card1R === 'A' && card2R === 'A';
    const isKK = card1R === 'K' && card2R === 'K';
    const isAKs = (card1R === 'A' && card2R === 'K' || card1R === 'K' && card2R === 'A') && player.cards[0].suit === player.cards[1].suit;
    const isAKo = (card1R === 'A' && card2R === 'K' || card1R === 'K' && card2R === 'A') && !isAKs;

    // ---- 计算位置调整后的可进牌档次（严格 EP/MP/LP 分层）----
    let openMaxTier;
    if (styleKey === 'Rock') {
      // Rock: 非常保守，早位只玩Tier1-2，晚位最多Tier3
      openMaxTier = earlyPos ? 2 : midPos ? 2 : latePos ? 3 : pos === 'SB' ? 2 : 3;
    } else if (styleKey === 'TAG') {
      // TAG: 早位Tier3，晚位Tier4
      openMaxTier = earlyPos ? 3 : midPos ? 3 : latePos ? 4 : pos === 'SB' ? 3 : 4;
    } else if (styleKey === 'LAG') {
      // LAG: 早位Tier3，晚位Tier5
      openMaxTier = earlyPos ? 3 : midPos ? 4 : latePos ? 5 : pos === 'SB' ? 4 : 5;
    } else if (styleKey === 'CS') {
      // CS: 宽，但不是最宽
      openMaxTier = earlyPos ? 4 : midPos ? 4 : latePos ? 5 : 5;
    } else if (styleKey === 'Maniac') {
      // Maniac: 极宽
      openMaxTier = earlyPos ? 4 : midPos ? 5 : 6;
    } else if (styleKey === 'Aggro') {
      // Aggro: 类似LAG
      openMaxTier = earlyPos ? 3 : midPos ? 4 : latePos ? 5 : 4;
    } else if (styleKey === 'Passive') {
      // Passive: 进牌中等，但倾向limp
      openMaxTier = earlyPos ? 3 : midPos ? 4 : latePos ? 5 : 4;
    } else { // Balanced / default
      openMaxTier = earlyPos ? 3 : midPos ? 3 : latePos ? 5 : pos === 'SB' ? 3 : 4;
    }

    // ---- 面对无加注（open或limp场景）currentBet <= BB ----
    if (currentBet <= BB_AMOUNT) {
      // BB option：当callAmount === 0 时，BB可以免费check或squeeze raise
      if (pos === 'BB' && callAmount === 0) {
        // 有对手limp进来：strong牌iso-raise，一般牌check
        if (tier <= 2) {
          // Count limpers (players who called BB without raising)
          const limpers = players.filter(p => !p.folded && !p.allin && p.id !== player.id && p.bet === BB_AMOUNT).length;
          const isoSize = Math.min(Math.floor(BB_AMOUNT * (3 + limpers)), player.chips + player.bet);
          return { action: 'raise', amount: isoSize, reasoning: `BB iso-raise，手牌${cardDesc}(Tier${tier})，${limpers}个limp`, strength: tier };
        }
        if (tier <= 3 && styleKey !== 'Rock') {
          // 偶尔squeeze Tier3
          if (r < 0.35) {
            const isoSize = Math.min(Math.floor(BB_AMOUNT * 3.5), player.chips + player.bet);
            return { action: 'raise', amount: isoSize, reasoning: `BB squeeze Tier3牌${cardDesc}`, strength: tier };
          }
        }
        return { action: 'check', reasoning: `BB option，手牌${cardDesc}，免费看翻牌`, strength: tier };
      }

      // SB未行动：面对limp可以完成或raise
      if (pos === 'SB') {
        const sbCallTier = styleKey === 'Rock' ? 2 : styleKey === 'TAG' ? 3 : styleKey === 'LAG' || styleKey === 'Aggro' ? 4 : 3;
        if (tier > openMaxTier) {
          return { action: 'fold', reasoning: `SB位置手牌${cardDesc}(Tier${tier})偏弱弃牌`, strength: tier };
        }
        if (tier <= sbCallTier) {
          // Raise from SB
          let raiseMulti = styleKey === 'Rock' ? 3.0 : 2.5;
          const limpers = players.filter(p => !p.folded && !p.allin && p.id !== player.id && p.bet === BB_AMOUNT).length;
          raiseMulti += limpers * 0.5;
          const raiseAmt = Math.min(Math.floor(BB_AMOUNT * raiseMulti), player.chips + player.bet);
          return { action: 'raise', amount: raiseAmt, reasoning: `SB位置open raise，手牌${cardDesc}(Tier${tier})`, strength: tier };
        }
        // Complete or fold
        if (styleKey === 'Passive' || styleKey === 'CS') {
          return { action: 'call', amount: toCall, reasoning: `SB完成small blind，手牌${cardDesc}(Tier${tier})`, strength: tier };
        }
        return { action: 'fold', reasoning: `SB手牌${cardDesc}(Tier${tier})偏弱，弃牌`, strength: tier };
      }

      // 其他位置：判断是否open raise
      if (tier > openMaxTier) {
        return { action: 'fold', reasoning: `${pos}位置，手牌${cardDesc}(Tier${tier})超出进牌范围(maxTier=${openMaxTier})，弃牌`, strength: tier };
      }

      // 决定raise还是limp
      let shouldRaise;
      if (styleKey === 'Passive') {
        shouldRaise = tier <= 2; // Passive只有premium才raise
      } else if (styleKey === 'CS') {
        shouldRaise = tier <= 2; // CS倾向call/limp
      } else if (styleKey === 'Rock') {
        shouldRaise = tier <= 2 || (tier === 3 && r < 0.8);
      } else {
        // TAG/LAG/Balanced/Aggro/Maniac：有牌就raise
        shouldRaise = tier <= 3 || latePos || r < 0.75;
      }

      if (shouldRaise) {
        // Open raise sizing
        let raiseMulti;
        if (styleKey === 'Rock') raiseMulti = 3.0;
        else if (styleKey === 'Maniac' || styleKey === 'Aggro') raiseMulti = 2.8;
        else if (latePos) raiseMulti = 2.2;
        else raiseMulti = 2.5;

        // +1BB per limp
        const limpers = players.filter(p => !p.folded && !p.allin && p.id !== player.id && p.bet === BB_AMOUNT).length;
        raiseMulti += limpers * 0.5;

        const raiseAmt = Math.min(Math.floor(BB_AMOUNT * raiseMulti), player.chips + player.bet);
        return { action: 'raise', amount: raiseAmt, reasoning: `${pos}位置open raise，手牌${cardDesc}(Tier${tier})`, strength: tier };
      }

      // limp（只有CS/Passive/偶尔其他风格）
      return { action: 'call', amount: toCall, reasoning: `${pos}位置limp，手牌${cardDesc}(Tier${tier})`, strength: tier };
    }

    // ---- 面对加注（currentBet > BB）----
    // 估算加注级别：通过BB倍数来判断（简化方式，因为没有历史加注追踪）
    const raiseLevel = currentBet / BB_AMOUNT;
    // 一般open raise约2-4BB；3bet约7-14BB；4bet约20BB+
    const facing3bet = raiseLevel >= 6;
    const facing4bet = raiseLevel >= 18;

    // ---- 面对4bet ----
    if (facing4bet) {
      if (isAA || isKK) {
        return { action: 'allin', amount: player.chips, reasoning: `面对4bet，持有${cardDesc}全下`, strength: tier };
      }
      if (isAKs && styleKey !== 'Rock' && r < 0.7) {
        return { action: 'allin', amount: player.chips, reasoning: `面对4bet，持有AKs全下`, strength: tier };
      }
      return { action: 'fold', reasoning: `面对4bet，手牌${cardDesc}(Tier${tier})不足，弃牌`, strength: tier };
    }

    // ---- 面对3bet ----
    if (facing3bet) {
      // 4bet with: AA/KK always, AKs usually, QQ/AKo by style
      if (isAA || isKK) {
        const fBetAmt = Math.min(Math.floor(currentBet * 2.5), player.chips + player.bet);
        return { action: 'raise', amount: fBetAmt, reasoning: `面对3bet，持有${cardDesc}进行4bet`, strength: tier };
      }
      if (isAKs && r < 0.75) {
        const fBetAmt = Math.min(Math.floor(currentBet * 2.5), player.chips + player.bet);
        return { action: 'raise', amount: fBetAmt, reasoning: `面对3bet，持有AKs进行4bet`, strength: tier };
      }
      // Call with QQ, JJ, AKo, AQs — adjusted by style and FoldTo3Bet
      const foldTo3betBase = style.FoldTo3Bet / 100;
      if (tier === 1) {
        // Should have 4bet above, but handle QQ/JJ (Tier2)
        // Tier1 here = AA/KK with small flat chance only
        return { action: 'call', amount: toCall, reasoning: `面对3bet，持有${cardDesc}(Tier1)慢玩跟注`, strength: tier };
      }
      if (tier === 2) {
        // QQ, JJ, AKo, AQs: call or fold depending on FoldTo3Bet
        if (r < foldTo3betBase * 0.8) {
          return { action: 'fold', reasoning: `面对3bet，持有${cardDesc}(Tier2)，按风格弃牌`, strength: tier };
        }
        return { action: 'call', amount: toCall, reasoning: `面对3bet，持有${cardDesc}(Tier2)跟注`, strength: tier };
      }
      if (tier === 3) {
        // 99/88/77/AJs etc — fold most of the time except CS/Maniac/LAG
        const callChance = styleKey === 'CS' ? 0.65 : styleKey === 'Maniac' ? 0.55 : styleKey === 'LAG' ? 0.35 : 0.15;
        if (r < callChance && (latePos || styleKey === 'CS')) {
          return { action: 'call', amount: toCall, reasoning: `面对3bet，持有${cardDesc}(Tier3)投机跟注`, strength: tier };
        }
        return { action: 'fold', reasoning: `面对3bet，手牌${cardDesc}(Tier3)，弃牌`, strength: tier };
      }
      // Tier 4+: fold to 3bet
      return { action: 'fold', reasoning: `面对3bet，手牌${cardDesc}(Tier${tier})不足，弃牌`, strength: tier };
    }

    // ---- 面对普通open raise ----
    const potOddsPreflop = calcPotOdds(callAmount, pot);

    // BB defend: already invested BB, need smaller equity to continue
    if (pos === 'BB') {
      // BB defense: call with wider range due to already-invested BB
      // Effective pot odds are better since BB already invested
      const bbDefendMaxTier = styleKey === 'Rock' ? 3 : styleKey === 'TAG' ? 4 : styleKey === 'CS' ? 6 :
                              styleKey === 'Maniac' ? 6 : styleKey === 'LAG' ? 5 : styleKey === 'Aggro' ? 5 : 4;
      if (tier > bbDefendMaxTier) {
        return { action: 'fold', reasoning: `BB面对raise，手牌${cardDesc}(Tier${tier})不足，弃牌`, strength: tier };
      }
      // 3bet from BB: Tier1 always, Tier2 sometimes
      if (tier === 1) {
        const threeBetProb = styleKey === 'Rock' ? 0.80 : styleKey === 'Passive' ? 0.65 : 0.88;
        if (r < threeBetProb) {
          const raiseAmt = Math.min(Math.floor(currentBet * 3), player.chips + player.bet);
          return { action: 'raise', amount: raiseAmt, reasoning: `BB 3bet，持有${cardDesc}(Tier1)`, strength: tier };
        }
      }
      if (tier === 2) {
        const threeBetProb2 = styleKey === 'Aggro' ? 0.45 : styleKey === 'Maniac' ? 0.50 : styleKey === 'LAG' ? 0.35 : 0.20;
        if (r < threeBetProb2) {
          const raiseAmt = Math.min(Math.floor(currentBet * 3), player.chips + player.bet);
          return { action: 'raise', amount: raiseAmt, reasoning: `BB 3bet，持有${cardDesc}(Tier2)`, strength: tier };
        }
      }
      return { action: 'call', amount: toCall, reasoning: `BB defend，手牌${cardDesc}(Tier${tier})`, strength: tier };
    }

    // 非BB面对raise：3bet范围 + call范围
    // 3bet决策
    if (tier === 1) {
      const threeBetProb = styleKey === 'Rock' ? 0.82 : styleKey === 'Passive' ? 0.65 : styleKey === 'CS' ? 0.60 : 0.90;
      if (r < threeBetProb) {
        const raiseAmt = Math.min(Math.floor(currentBet * 3), player.chips + player.bet);
        return { action: 'raise', amount: raiseAmt, reasoning: `持有${cardDesc}(Premium) 3bet`, strength: tier };
      }
      return { action: 'call', amount: toCall, reasoning: `持有${cardDesc}(Premium)慢玩，跟注`, strength: tier };
    }

    if (tier === 2) {
      const threeBetProb = (styleKey === 'Aggro' || styleKey === 'Maniac') ? 0.50 : styleKey === 'LAG' ? 0.40 :
                           styleKey === 'TAG' ? 0.28 : styleKey === 'Rock' ? 0.10 : 0.22;
      const posBonus = latePos ? 0.12 : earlyPos ? -0.10 : 0;
      if (r < threeBetProb + posBonus) {
        const raiseAmt = Math.min(Math.floor(currentBet * 3), player.chips + player.bet);
        return { action: 'raise', amount: raiseAmt, reasoning: `持有${cardDesc}(Tier2) 3bet`, strength: tier };
      }
      // Call Tier2: most positions (Rock folds EP)
      if (styleKey === 'Rock' && earlyPos) {
        return { action: 'fold', reasoning: `Rock早位，持有${cardDesc}(Tier2)面对raise，弃牌`, strength: tier };
      }
      return { action: 'call', amount: toCall, reasoning: `持有${cardDesc}(Tier2)跟注open raise`, strength: tier };
    }

    if (tier === 3) {
      // Playable: 位置+赔率决定
      const isSmallPair3 = player.cards[0].rank === player.cards[1].rank;
      const spr3 = player.chips / Math.max(pot + callAmount, 1);
      const setMineOkay3 = isSmallPair3 && spr3 >= 10 && potOddsPreflop < 0.20;
      let canCall3 = false;
      if (styleKey === 'Rock') {
        canCall3 = latePos && potOddsPreflop < 0.30;
      } else if (styleKey === 'TAG' || styleKey === 'Balanced') {
        canCall3 = (latePos && potOddsPreflop < 0.36) || (midPos && potOddsPreflop < 0.30) || setMineOkay3;
      } else if (styleKey === 'LAG' || styleKey === 'Aggro') {
        canCall3 = (latePos || midPos) && potOddsPreflop < 0.42;
      } else if (styleKey === 'CS') {
        canCall3 = potOddsPreflop < 0.45;
      } else if (styleKey === 'Passive') {
        canCall3 = (latePos || setMineOkay3) && potOddsPreflop < 0.36;
      } else if (styleKey === 'Maniac') {
        canCall3 = potOddsPreflop < 0.44;
      }
      if (canCall3) {
        return { action: 'call', amount: toCall, reasoning: `持有${cardDesc}(Tier3)${setMineOkay3?'set mining跟注':'有位置有赔率跟注'}`, strength: tier };
      }
      return { action: 'fold', reasoning: `持有${cardDesc}(Tier3)赔率不足或位置不佳，弃牌`, strength: tier };
    }

    if (tier === 4) {
      const spr4 = player.chips / Math.max(pot + callAmount, 1);
      let canCall4 = false;
      if (styleKey === 'LAG' || styleKey === 'Maniac') {
        canCall4 = latePos && spr4 >= 4 && potOddsPreflop < 0.38;
      } else if (styleKey === 'CS') {
        canCall4 = potOddsPreflop < 0.40;
      } else if (styleKey === 'Aggro' || styleKey === 'Balanced') {
        canCall4 = latePos && spr4 >= 5 && potOddsPreflop < 0.30;
      } else if (styleKey === 'TAG') {
        canCall4 = latePos && spr4 >= 6 && potOddsPreflop < 0.25;
      }
      if (canCall4) {
        return { action: 'call', amount: toCall, reasoning: `持有${cardDesc}(Tier4)后位投机跟注`, strength: tier };
      }
      return { action: 'fold', reasoning: `持有${cardDesc}(Tier4)弃牌`, strength: tier };
    }

    // Tier5 / 6: 只有CS/Maniac可能call
    if (tier === 5) {
      if ((styleKey === 'CS' || styleKey === 'Maniac') && potOddsPreflop < 0.35 && latePos) {
        return { action: 'call', amount: toCall, reasoning: `持有${cardDesc}(Tier5)${styleKey}宽松跟注`, strength: tier };
      }
      return { action: 'fold', reasoning: `手牌${cardDesc}(Tier5)弃牌`, strength: tier };
    }

    return { action: 'fold', reasoning: `手牌${cardDesc}(Tier${tier})垃圾牌，弃牌`, strength: tier };
  }

  // =====================================================
  // POSTFLOP 决策
  // =====================================================
  const texture = analyzeBoardTexture(communityCards);
  const handClass = classifyPostflopHand(player.cards, communityCards);
  const cat = handClass.category;
  const cardDesc = player.cards.map(c => c.rank + c.suit).join('');
  const boardDesc = communityCards.map(c => c.rank + c.suit).join(' ');
  const potOdds = calcPotOdds(callAmount, pot);
  const wetness = texture.wetness;

  // 计算近似胜率
  const activeOpps = players.filter(p => !p.folded && p.id !== player.id).length;
  const equity = communityCards.length > 0 ? estimateEquity(player.cards, communityCards, activeOpps) : 0.5;

  // 风格参数映射
  const cbetFreq = {
    TAG: 0.70, LAG: 0.68, Rock: 0.52, CS: 0.30,
    Maniac: 0.85, Balanced: 0.62, Aggro: 0.78, Passive: 0.28
  };
  const baseCbet = cbetFreq[styleKey] || 0.62;

  // ---- 辅助函数：构建下注金额（相对于当前下注总量） ----
  function makeBet(fraction) {
    const betAmt = sizeBet(pot, fraction);
    return Math.min(player.bet + betAmt, player.chips + player.bet);
  }
  function makeRaise(multiplier) {
    return Math.min(Math.floor(currentBet * multiplier), player.chips + player.bet);
  }

  // ---- 面对check（可以check或bet）----
  if (canCheck) {

    // ===== NUTS（超强牌：三条+/顺子/同花/葫芦/四条/同花顺）=====
    if (cat === 'nuts') {
      // 坚果牌绝对不check-fold；只在前几条街偶尔慢打
      const slowPlayProb = (street === 'river') ? 0 :
                           styleKey === 'Passive' ? 0.35 : styleKey === 'Rock' ? 0.25 :
                           styleKey === 'CS' ? 0.30 : 0.12;
      if (r < slowPlayProb) {
        return { action: 'check', reasoning: `${handClass.label}(${cardDesc})慢打trap，board: ${boardDesc}`, strength: equity };
      }
      // Value bet: river大注，其他街中等注
      const frac = street === 'river' ? 0.75 : street === 'turn' ? 0.65 : 0.60;
      return { action: 'raise', amount: makeBet(frac),
        reasoning: `${handClass.label}(${cardDesc})价值下注${Math.round(frac*100)}%pot`, strength: equity };
    }

    // ===== STRONG（两对/超顶对/顶对顶踢）=====
    if (cat === 'strong') {
      // 通常下注，湿润牌面下大注保护
      const betProb = styleKey === 'Passive' ? 0.42 : styleKey === 'CS' ? 0.35 :
                      styleKey === 'Rock' ? 0.65 : styleKey === 'Aggro' || styleKey === 'Maniac' ? 0.90 : 0.80;
      if (r < betProb) {
        const frac = street === 'river' ? 0.70 : 0.55 + wetness * 0.08;
        return { action: 'raise', amount: makeBet(frac),
          reasoning: `${handClass.label}(${cardDesc})价值下注`, strength: equity };
      }
      // Check-call line (check to induce)
      return { action: 'check', reasoning: `${handClass.label}(${cardDesc})check-call线路`, strength: equity };
    }

    // ===== MEDIUM（顶对弱踢/第二对）=====
    if (cat === 'medium') {
      // C-bet频率调整
      let cbetProb = baseCbet;
      if (wetness === 2) cbetProb *= 0.50;  // 湿润牌面大幅减少
      if (wetness === 1) cbetProb *= 0.80;
      if (texture.paired) cbetProb *= 0.65;
      if (texture.hasAce && !player.cards.some(c => c.rank === 'A')) cbetProb *= 0.70; // 有A面但没A
      if (latePos) cbetProb *= 1.15;
      if (earlyPos) cbetProb *= 0.75;
      if (street === 'turn') cbetProb *= 0.80;
      if (street === 'river') cbetProb *= 0.45;

      if (r < cbetProb) {
        // 干燥小注，湿润大注
        const frac = street === 'river' ? 0.60 :
                     wetness === 0 ? 0.33 : wetness === 1 ? 0.45 : 0.55;
        return { action: 'raise', amount: makeBet(frac),
          reasoning: `${handClass.label}(${cardDesc})CBet ${Math.round(cbetProb*100)}%，wetness=${wetness}`, strength: equity };
      }
      return { action: 'check', reasoning: `${handClass.label}(${cardDesc})过牌`, strength: equity };
    }

    // ===== DRAW（同花听牌/两头顺）=====
    if (cat === 'draw') {
      // river上听牌未完成不下注（没有showdown value）
      if (street === 'river') {
        // 偶尔纯bluff
        const riverBluff = styleKey === 'Maniac' ? 0.45 : styleKey === 'Aggro' ? 0.30 :
                           styleKey === 'LAG' ? 0.22 : styleKey === 'Balanced' ? 0.15 : style.bluffFreq * 0.5;
        if (r < riverBluff) {
          return { action: 'raise', amount: makeBet(0.65), reasoning: `${handClass.label}(${cardDesc})river bluff`, strength: equity };
        }
        return { action: 'check', reasoning: `${handClass.label}(${cardDesc})river听牌未完成，过牌`, strength: equity };
      }
      // 半诈唬频率
      const sbProb = styleKey === 'Maniac' ? 0.68 : styleKey === 'Aggro' ? 0.60 : styleKey === 'LAG' ? 0.52 :
                     styleKey === 'Passive' ? 0.14 : styleKey === 'CS' ? 0.10 : styleKey === 'Rock' ? 0.22 :
                     styleKey === 'TAG' ? 0.40 : 0.40;
      const adjSB = latePos ? sbProb * 1.25 : earlyPos ? sbProb * 0.55 : sbProb;
      if (r < Math.min(0.80, adjSB)) {
        const frac = 0.52 + wetness * 0.08;
        return { action: 'raise', amount: makeBet(frac),
          reasoning: `${handClass.label}(${cardDesc})半诈唬下注`, strength: equity };
      }
      return { action: 'check', reasoning: `${handClass.label}(${cardDesc})免费看牌`, strength: equity };
    }

    // ===== DRAW_WEAK（卡肚）=====
    if (cat === 'draw_weak') {
      if (street === 'river') {
        // 偶尔bluff
        if (r < style.bluffFreq * 0.4) {
          return { action: 'raise', amount: makeBet(0.60), reasoning: `${handClass.label}(${cardDesc})river纯bluff`, strength: equity };
        }
        return { action: 'check', reasoning: `${handClass.label}(${cardDesc})弱听牌river过牌`, strength: equity };
      }
      // 偶尔semi-bluff卡肚
      const gutSB = styleKey === 'Maniac' ? 0.35 : styleKey === 'Aggro' ? 0.28 : style.bluffFreq * 0.6;
      if (r < gutSB && latePos) {
        return { action: 'raise', amount: makeBet(0.45), reasoning: `${handClass.label}(${cardDesc})后位半诈唬`, strength: equity };
      }
      return { action: 'check', reasoning: `${handClass.label}(${cardDesc})免费看牌`, strength: equity };
    }

    // ===== WEAK / AIR =====
    if (cat === 'weak' || cat === 'air') {
      if (street === 'river') {
        // River bluff: 较低频率，只在有利位置
        const rvBluff = latePos ? style.bluffFreq * 0.55 : style.bluffFreq * 0.20;
        if (r < rvBluff && !texture.paired) {
          return { action: 'raise', amount: makeBet(0.65), reasoning: `${handClass.label}(${cardDesc})river bluff`, strength: equity };
        }
        return { action: 'check', reasoning: `${handClass.label}(${cardDesc})过牌`, strength: equity };
      }
      // Flop/Turn bluff（纯诈唬，条件苛刻）
      const boardFavorable = !texture.paired && wetness <= 1 && latePos;
      const bluffP = boardFavorable ? style.bluffFreq * 1.4 : style.bluffFreq * 0.35;
      if (r < bluffP) {
        return { action: 'raise', amount: makeBet(0.45), reasoning: `${handClass.label}(${cardDesc})选择性bluff`, strength: equity };
      }
      return { action: 'check', reasoning: `${handClass.label}(${cardDesc})过牌`, strength: equity };
    }

    return { action: 'check', reasoning: `过牌`, strength: equity };
  }

  // ---- 面对下注（需要call/raise/fold）----
  const betRatio = callAmount / Math.max(pot, 1);

  // ===== NUTS 面对下注 =====
  if (cat === 'nuts') {
    // 坚果牌绝不fold；根据风格决定raise还是call
    const raiseProb = styleKey === 'Passive' ? 0.28 : styleKey === 'CS' ? 0.22 :
                      styleKey === 'Rock' ? 0.55 : styleKey === 'Maniac' || styleKey === 'Aggro' ? 0.88 :
                      styleKey === 'TAG' ? 0.72 : styleKey === 'LAG' ? 0.75 : 0.68;
    if (r < raiseProb) {
      return { action: 'raise', amount: makeRaise(2.75),
        reasoning: `${handClass.label}(${cardDesc})面对下注加注价值`, strength: equity };
    }
    return { action: 'call', amount: toCall, reasoning: `${handClass.label}(${cardDesc})慢玩跟注`, strength: equity };
  }

  // ===== STRONG 面对下注（两对/超顶对/顶对顶踢）=====
  if (cat === 'strong') {
    const raiseProb = styleKey === 'Aggro' ? 0.52 : styleKey === 'Maniac' ? 0.55 : styleKey === 'LAG' ? 0.42 :
                      styleKey === 'TAG' ? 0.35 : styleKey === 'Rock' ? 0.22 : 0.28;
    // 只在下注合理时raise（过大的bet就call）
    if (r < raiseProb && betRatio < 0.70) {
      return { action: 'raise', amount: makeRaise(2.75),
        reasoning: `${handClass.label}(${cardDesc})价值加注`, strength: equity };
    }
    // 面对极大下注（>pot）考虑fold（弱two pair/overpair on scary board）
    if (betRatio > 1.0 && street === 'river' && r < 0.30) {
      return { action: 'fold', reasoning: `${handClass.label}(${cardDesc})面对超大下注谨慎弃牌`, strength: equity };
    }
    return { action: 'call', amount: toCall, reasoning: `${handClass.label}(${cardDesc})跟注`, strength: equity };
  }

  // ===== MEDIUM 面对下注（顶对弱踢/第二对）=====
  if (cat === 'medium') {
    // 精确pot odds判断：equity需高于pot odds * margin
    const margin = styleKey === 'CS' ? 0.95 : styleKey === 'Maniac' ? 0.90 : styleKey === 'TAG' ? 1.10 : 1.05;
    if (equity > potOdds * margin) {
      // River大注慎重
      if (street === 'river' && betRatio > 0.85) {
        return { action: 'fold', reasoning: `${handClass.label}(${cardDesc})river大注equity不足(${Math.round(equity*100)}%<${Math.round(potOdds*margin*100)}%)，弃牌`, strength: equity };
      }
      return { action: 'call', amount: toCall, reasoning: `${handClass.label}(${cardDesc})equity ${Math.round(equity*100)}%>odds ${Math.round(potOdds*100)}%，跟注`, strength: equity };
    }
    return { action: 'fold', reasoning: `${handClass.label}(${cardDesc})equity ${Math.round(equity*100)}%<odds ${Math.round(potOdds*100)}%，弃牌`, strength: equity };
  }

  // ===== DRAW 面对下注 =====
  if (cat === 'draw') {
    // River上听牌未完成：fold（偶尔bluff-catch的CS/Maniac除外）
    if (street === 'river') {
      if ((styleKey === 'CS' || styleKey === 'Maniac') && potOdds < 0.38) {
        return { action: 'call', amount: toCall, reasoning: `${handClass.label}(${cardDesc})CS/Maniac river hero call`, strength: equity };
      }
      return { action: 'fold', reasoning: `${handClass.label}(${cardDesc})river听牌未完成弃牌`, strength: equity };
    }
    // 同花听牌约35%胜率，两头顺约32%
    const drawRawEquity = handClass.label.includes('同花') ? 0.36 : 0.33;
    const spr = player.chips / Math.max(pot, 1);
    const impliedBonus = spr > 5 ? 0.09 : spr > 2.5 ? 0.05 : 0.02;
    const effectiveEquity = drawRawEquity + impliedBonus;
    if (potOdds < effectiveEquity) {
      // 偶尔semi-bluff raise
      const sbRaiseP = style.bluffFreq * 1.6;
      if (r < sbRaiseP && betRatio < 0.55 && street !== 'river') {
        return { action: 'raise', amount: makeRaise(2.6),
          reasoning: `${handClass.label}(${cardDesc})半诈唬加注`, strength: equity };
      }
      return { action: 'call', amount: toCall, reasoning: `${handClass.label}(${cardDesc})赔率合适跟注(odds:${Math.round(potOdds*100)}%<eq:${Math.round(effectiveEquity*100)}%)`, strength: equity };
    }
    return { action: 'fold', reasoning: `${handClass.label}(${cardDesc})赔率不足(odds:${Math.round(potOdds*100)}%)，弃牌`, strength: equity };
  }

  // ===== DRAW_WEAK 面对下注 =====
  if (cat === 'draw_weak') {
    if (street === 'river') {
      return { action: 'fold', reasoning: `${handClass.label}(${cardDesc})river卡肚弃牌`, strength: equity };
    }
    const gutEquity = 0.18;
    const spr2 = player.chips / Math.max(pot, 1);
    if (potOdds < gutEquity + (spr2 > 6 ? 0.10 : 0.04)) {
      return { action: 'call', amount: toCall, reasoning: `${handClass.label}(${cardDesc})implied odds跟注`, strength: equity };
    }
    return { action: 'fold', reasoning: `${handClass.label}，赔率不足弃牌`, strength: equity };
  }

  // ===== WEAK / AIR 面对下注 =====
  if (cat === 'weak' || cat === 'air') {
    // 偶尔bluff-raise在有利位置flop/turn
    const canBluffRaise = latePos && betRatio < 0.42 && street !== 'river';
    const bluffRaiseP = canBluffRaise ? style.bluffFreq * 0.85 : 0;
    if (r < bluffRaiseP) {
      return { action: 'raise', amount: makeRaise(2.6),
        reasoning: `${handClass.label}(${cardDesc})有利位置bluff raise`, strength: equity };
    }
    // CS/Maniac可能call (float)
    if (styleKey === 'CS' && potOdds < 0.42 && street !== 'river') {
      return { action: 'call', amount: toCall, reasoning: `CS float跟注`, strength: equity };
    }
    return { action: 'fold', reasoning: `${handClass.label}(${cardDesc})弃牌`, strength: equity };
  }

  // 兜底：按equity决定
  if (equity > potOdds * 1.05) {
    return { action: 'call', amount: toCall, reasoning: `equity ${Math.round(equity*100)}%跟注`, strength: equity };
  }
  return { action: 'fold', reasoning: `equity不足弃牌`, strength: equity };
}

// ============ 游戏状态管理 ============
let G = {
  players: [],
  deck: [],
  communityCards: [],
  pot: 0,
  sidePots: [],
  street: 'preflop',
  dealerPos: 0,
  currentPlayer: 0,
  currentBet: 0,
  minRaise: BB_AMOUNT,
  lastRaiser: -1,
  handNumber: 0,
  running: false,
  waitingForHuman: false,
  phase: 'idle', // idle, betting, showdown, done
  actionQueue: [],
  // User stats tracking
  userStats: {
    hands: 0, wins: 0, startChips: STARTING_CHIPS,
    vpipHands: 0, pfrHands: 0,
    aggressiveActions: 0, passiveActions: 0,
    rebuys: 0,
  },
  raiseAmount: 0,
  recommendedRaise: 0,
};

let actionLog = [];    // 每手牌的行动记录
let reviewMode = false; // 手牌结束后是否处于复盘模式
let skipMode = false;  // 弃牌后"跳到结局"快速模式

// ---- Timer management to prevent freeze/leak across hands ----
let activeTimers = [];
function safeTimeout(fn, delay) {
  const id = setTimeout(() => {
    activeTimers = activeTimers.filter(t => t !== id);
    fn();
  }, delay);
  activeTimers.push(id);
  return id;
}
function clearAllTimers() {
  activeTimers.forEach(id => clearTimeout(id));
  activeTimers = [];
}

function resetHandState() {
  actionLog = [];
  reviewMode = false;
  skipMode = false;
  G.deck = shuffleDeck(createDeck());
  G.communityCards = [];
  G.pot = 0;
  G.sidePots = [];
  G.street = 'preflop';
  G.currentBet = BB_AMOUNT;
  G.minRaise = BB_AMOUNT * 2;
  G.lastRaiser = -1;
  G.waitingForHuman = false;
  G.phase = 'betting';
  G.actionQueue = [];
  for (const p of G.players) {
    p.cards = [];
    p.bet = 0;
    p.totalBet = 0;
    p.folded = false;
    p.allin = false;
    p.acted = false;
  }
}

function startNewHand() {
  // Prevent re-entrant calls and clear any stale timers from the previous hand
  clearAllTimers();
  // Disable all "新一局" buttons to prevent double-click during initialization
  document.querySelectorAll('.btn-new').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });

  if (G.players.length === 0) G.players = createPlayers();

  // Rebuy any player whose chips have hit 0
  for (const p of G.players) {
    if (p.chips <= 0) {
      p.chips = STARTING_CHIPS;
      if (!p.rebuys) p.rebuys = 0;
      p.rebuys++;
      if (p.isHuman) {
        G.userStats.rebuys++;
        logMsg(`你 重新买入 $${STARTING_CHIPS}（第 ${G.userStats.rebuys} 次买入）`);
        updateUserStats();
      } else {
        logMsg(`${p.name} 重新买入 $${STARTING_CHIPS}`);
      }
    }
  }
  G.handNumber++;
  G.userStats.hands++;
  resetHandState();
  // Advance dealer position (skip broke players)
  G.dealerPos = (G.dealerPos + 1) % 9;
  while (G.players[G.dealerPos].chips <= 0) G.dealerPos = (G.dealerPos + 1) % 9;
  // Seat positions relative to dealer
  // 0=BTN (dealer), 1=SB, 2=BB, 3=UTG, ...
  assignPositions();
  // Post blinds
  const sbIdx = getSeatByPosition('SB');
  const bbIdx = getSeatByPosition('BB');
  postBlind(sbIdx, SB_AMOUNT);
  postBlind(bbIdx, BB_AMOUNT);
  // Deal hole cards
  for (let i = 0; i < 2; i++) for (const p of G.players) {
    if (p.chips > 0 || p.allin) p.cards.push(G.deck.pop());
  }
  // First to act: UTG
  G.currentPlayer = getSeatByPosition('UTG');
  G.running = true;
  logMsg(`--- 第 ${G.handNumber} 手牌 开始 ---`);
  logMsg(`庄家: ${G.players[G.dealerPos].name} | SB: ${G.players[sbIdx].name} | BB: ${G.players[bbIdx].name}`);
  renderAll();
  updateCoach();
  advanceTurn();
}

function assignPositions() {
  // positions for 9 seats relative to dealerPos
  const posNames = ['BTN','SB','BB','UTG','UTG+1','MP','MP+1','CO','CO+1'];
  for (let i = 0; i < 9; i++) {
    const seatIdx = (G.dealerPos + i) % 9;
    G.players[seatIdx].position = posNames[i];
    G.players[seatIdx].posIdx = i;
  }
}

function getSeatByPosition(pos) {
  return G.players.findIndex(p => p.position === pos);
}

function postBlind(idx, amount) {
  if (idx < 0) return;
  const p = G.players[idx];
  const actual = Math.min(amount, p.chips);
  p.chips -= actual;
  p.bet = actual;
  p.totalBet = actual;
  G.pot += actual;
  if (p.chips === 0) p.allin = true;
  logMsg(`${p.name} 发盲注 ${actual}`);
}

function advanceTurn() {
  if (!G.running) return;
  const totalActive = G.players.filter(p => !p.folded);
  // Only one player left — they win immediately
  if (totalActive.length === 1) {
    endHand();
    return;
  }
  // Check if this street's betting is complete
  if (isBettingDone()) {
    nextStreet();
    return;
  }
  // Find the next player who needs to act, scanning up to 9 seats forward
  for (let i = 0; i < 9; i++) {
    const seatIdx = (G.currentPlayer + i) % 9;
    const p = G.players[seatIdx];
    if (p.folded || p.allin) continue;
    if (!needsToAct(p)) continue;
    // Found a player who must act
    G.currentPlayer = seatIdx;
    if (p.isHuman) {
      G.waitingForHuman = true;
      renderAll();
      updateCoach();
      showHumanActions();
      return;
    } else {
      G.waitingForHuman = false;
      renderAll();
      const capturedSeat = seatIdx;          // capture by value — no closure over G.currentPlayer
      const capturedHandNum = G.handNumber;  // detect stale timeouts from previous hands
      safeTimeout(() => {
        if (!G.running || G.handNumber !== capturedHandNum) return;
        doAiAction(capturedSeat);
      }, AI_THINK_DELAY);
      return;
    }
  }
  // No player found who needs to act — street is over
  nextStreet();
}

function needsToAct(p) {
  if (p.folded || p.allin) return false;
  // Has not acted at all this street
  if (!p.acted) return true;
  // Has acted but bet is less than current bet (was raised)
  if (p.bet < G.currentBet) return true;
  return false;
}

function showSkipToEndButton() {
  // Desktop action area
  const btns = document.getElementById('action-buttons');
  if (btns) {
    btns.innerHTML = '<button class="action-btn btn-skip-end" onclick="skipToEnd()">⏭ 跳到结局</button>';
  }
  document.getElementById('action-title').textContent = '你已弃牌';
  document.getElementById('action-msg').textContent = '点击"跳到结局"查看所有人的手牌和最终结果';
}

function skipToEnd() {
  if (!G.running) return;
  skipMode = true;
  // Clear all pending AI timeouts
  clearAllTimers();
  // Hide the skip button
  const btns = document.getElementById('action-buttons');
  if (btns) btns.innerHTML = '';
  G.waitingForHuman = false;
  // Run all remaining AI actions immediately (synchronously) until hand ends
  runRemainingActionsSync();
}

function runRemainingActionsSync() {
  // Keep advancing until hand ends
  const MAX_ITER = 200;
  let iter = 0;
  while (G.running && iter < MAX_ITER) {
    iter++;
    const totalActive = G.players.filter(p => !p.folded);
    if (totalActive.length === 1) { endHand(); return; }
    if (isBettingDone()) {
      // Advance street synchronously
      for (const p of G.players) { p.bet = 0; p.acted = false; }
      G.currentBet = 0;
      G.minRaise = BB_AMOUNT;
      G.lastRaiser = -1;
      if (G.street === 'preflop') {
        G.street = 'flop';
        G.communityCards.push(G.deck.pop(), G.deck.pop(), G.deck.pop());
        logMsg(`--- Flop: ${G.communityCards.map(c=>c.rank+c.suit).join(' ')} ---`);
      } else if (G.street === 'flop') {
        G.street = 'turn';
        G.communityCards.push(G.deck.pop());
        logMsg(`--- Turn: ${G.communityCards[3].rank+G.communityCards[3].suit} ---`);
      } else if (G.street === 'turn') {
        G.street = 'river';
        G.communityCards.push(G.deck.pop());
        logMsg(`--- River: ${G.communityCards[4].rank+G.communityCards[4].suit} ---`);
      } else if (G.street === 'river') {
        endHand(); return;
      }
      // Reset first-to-act for new street
      G.currentPlayer = (G.dealerPos + 1) % 9;
      let safetyCount = 0;
      while ((G.players[G.currentPlayer].folded || G.players[G.currentPlayer].allin) && safetyCount < 9) {
        G.currentPlayer = (G.currentPlayer + 1) % 9;
        safetyCount++;
      }
      if (G.players.filter(p => !p.folded && !p.allin).length === 0) { endHand(); return; }
      continue;
    }
    // Find next player to act
    let acted = false;
    for (let i = 0; i < 9; i++) {
      const seatIdx = (G.currentPlayer + i) % 9;
      const p = G.players[seatIdx];
      if (p.folded || p.allin) continue;
      if (!needsToAct(p)) continue;
      G.currentPlayer = seatIdx;
      if (p.isHuman) {
        // Human already folded — skip
        G.currentPlayer = (seatIdx + 1) % 9;
        acted = true;
        break;
      }
      // AI acts synchronously
      const gameState = {
        street: G.street, pot: G.pot, currentBet: G.currentBet,
        players: G.players, communityCards: G.communityCards, dealerPos: G.dealerPos
      };
      const decision = aiDecide(p, gameState);
      actionLog.push({
        playerId: p.id, playerName: p.name, styleKey: p.styleKey,
        street: G.street, action: decision.action, amount: decision.amount || 0,
        reasoning: decision.reasoning || '', handStrength: Math.round((decision.strength || 0) * 100),
        pot: G.pot, currentBet: G.currentBet, positionNote: p.position, cards: [...p.cards],
      });
      applyAction(seatIdx, decision.action, decision.amount || 0);
      G.currentPlayer = (seatIdx + 1) % 9;
      acted = true;
      break;
    }
    if (!acted) { endHand(); return; }
  }
  if (G.running) endHand();
}

function isBettingDone() {
  const active = G.players.filter(p => !p.folded && !p.allin);
  if (active.length === 0) return true;
  // All active players have acted and matched the current bet
  return active.every(p => p.acted && p.bet === G.currentBet);
}

function doAiAction(seatIdx) {
  if (!G.running) return;
  const p = G.players[seatIdx];
  // Guard: skip if somehow already folded/allin (shouldn't normally happen)
  if (p.folded || p.allin) {
    G.currentPlayer = (seatIdx + 1) % 9;
    advanceTurn();
    return;
  }
  const gameState = {
    street: G.street, pot: G.pot, currentBet: G.currentBet,
    players: G.players, communityCards: G.communityCards, dealerPos: G.dealerPos
  };
  const decision = aiDecide(p, gameState);
  if (!p.isHuman) {
    actionLog.push({
      playerId: p.id,
      playerName: p.name,
      styleKey: p.styleKey,
      street: G.street,
      action: decision.action,
      amount: decision.amount || 0,
      reasoning: decision.reasoning || '',
      handStrength: Math.round((decision.strength || 0) * 100),
      pot: G.pot,
      currentBet: G.currentBet,
      positionNote: p.position,
      cards: [...p.cards],
    });
  }
  applyAction(seatIdx, decision.action, decision.amount || 0);
  // Advance to the seat after the one that just acted
  G.currentPlayer = (seatIdx + 1) % 9;
  renderAll();
  updateCoach();
  advanceTurn();
}

function applyAction(seatIdx, action, amount) {
  const p = G.players[seatIdx];
  switch(action) {
    case 'fold':
      p.folded = true;
      p.acted = true;
      logMsg(`${p.name} 弃牌`);
      break;
    case 'check':
      p.acted = true;
      logMsg(`${p.name} 看牌`);
      break;
    case 'call': {
      const toCall = Math.min(G.currentBet - p.bet, p.chips);
      p.chips -= toCall;
      p.bet += toCall;
      p.totalBet += toCall;
      G.pot += toCall;
      p.acted = true;
      if (p.chips === 0) p.allin = true;
      logMsg(`${p.name} 跟注 ${toCall} (总注: ${p.bet})`);
      // Track human stats
      if (p.isHuman) { G.userStats.vpipHands++; G.userStats.passiveActions++; }
      break;
    }
    case 'raise': {
      const raiseTotal = Math.min(amount, p.chips + p.bet);
      const raiseAdd = raiseTotal - p.bet;
      G.pot += raiseAdd;
      p.chips -= raiseAdd;
      p.bet = raiseTotal;
      p.totalBet += raiseAdd;
      G.minRaise = Math.max(G.minRaise, raiseTotal - G.currentBet);
      G.currentBet = raiseTotal;
      G.lastRaiser = seatIdx;
      p.acted = true;
      if (p.chips === 0) p.allin = true;
      // Reset others' acted status (they need to respond to the raise)
      for (const op of G.players) {
        if (op.id !== p.id && !op.folded && !op.allin) op.acted = false;
      }
      logMsg(`${p.name} 加注至 ${raiseTotal}`);
      if (p.isHuman) { G.userStats.vpipHands++; G.userStats.pfrHands++; G.userStats.aggressiveActions++; }
      break;
    }
    case 'allin': {
      const allInAmt = p.chips;
      G.pot += allInAmt;
      p.bet += allInAmt;
      p.totalBet += allInAmt;
      if (p.bet > G.currentBet) {
        G.minRaise = Math.max(G.minRaise, p.bet - G.currentBet);
        G.currentBet = p.bet;
        G.lastRaiser = seatIdx;
        for (const op of G.players) {
          if (op.id !== p.id && !op.folded && !op.allin) op.acted = false;
        }
      }
      p.chips = 0;
      p.allin = true;
      p.acted = true;
      logMsg(`${p.name} 全下 ${allInAmt}`);
      if (p.isHuman) { G.userStats.vpipHands++; G.userStats.aggressiveActions++; }
      break;
    }
  }
}

function humanAction(action) {
  if (!G.waitingForHuman) return;
  G.waitingForHuman = false;
  const human = G.players[HUMAN_SEAT];
  let amount = 0;
  if (action === 'raise') amount = G.raiseAmount;
  if (action === 'call') amount = Math.min(G.currentBet - human.bet, human.chips);
  applyAction(HUMAN_SEAT, action, amount);
  hideHumanActions();
  G.currentPlayer = (HUMAN_SEAT + 1) % 9;
  renderAll();
  updateCoach();
  if (action === 'fold') {
    showSkipToEndButton();
  }
  advanceTurn();
}

function nextStreet() {
  // Reset bets for new street
  for (const p of G.players) { p.bet = 0; p.acted = false; }
  G.currentBet = 0;
  G.minRaise = BB_AMOUNT;
  G.lastRaiser = -1;
  if (G.street === 'preflop') {
    G.street = 'flop';
    G.communityCards.push(G.deck.pop(), G.deck.pop(), G.deck.pop());
    logMsg(`--- Flop: ${G.communityCards.map(c=>c.rank+c.suit).join(' ')} ---`);
  } else if (G.street === 'flop') {
    G.street = 'turn';
    G.communityCards.push(G.deck.pop());
    logMsg(`--- Turn: ${G.communityCards[3].rank+G.communityCards[3].suit} ---`);
  } else if (G.street === 'turn') {
    G.street = 'river';
    G.communityCards.push(G.deck.pop());
    logMsg(`--- River: ${G.communityCards[4].rank+G.communityCards[4].suit} ---`);
  } else if (G.street === 'river') {
    endHand();
    return;
  }
  // First to act post-flop: first active player left of dealer
  G.currentPlayer = (G.dealerPos + 1) % 9;
  while (G.players[G.currentPlayer].folded || G.players[G.currentPlayer].allin) {
    G.currentPlayer = (G.currentPlayer + 1) % 9;
    // Safety: if all folded/allin, end
    if (G.players.filter(p => !p.folded && !p.allin).length === 0) { endHand(); return; }
  }
  renderAll();
  updateCoach();
  advanceTurn();
}

function endHand() {
  G.running = false;
  G.waitingForHuman = false;
  hideHumanActions();
  // Showdown / determine winners
  const remaining = G.players.filter(p => !p.folded);
  let winnerIdx = -1, winnerHand = null;
  if (remaining.length === 1) {
    winnerIdx = remaining[0].id;
  } else {
    // Compare hands
    for (const p of remaining) {
      const h = getBestHand(p.cards, G.communityCards);
      if (!winnerHand || compareHands(h, winnerHand) > 0) {
        winnerHand = h;
        winnerIdx = p.id;
      }
    }
  }
  const winner = G.players[winnerIdx];
  winner.chips += G.pot;
  const isHumanWin = winnerIdx === HUMAN_SEAT;
  const profit = isHumanWin ? G.pot - G.players[HUMAN_SEAT].totalBet : -G.players[HUMAN_SEAT].totalBet;
  if (isHumanWin) G.userStats.wins++;
  updateUserStats();
  logMsg(`${winner.name} 赢得底池 ${G.pot}！手牌: ${winnerHand ? winnerHand.name : ''}`);
  // Show community cards for reveal
  if (G.communityCards.length < 5) {
    // Run out the board
    while (G.communityCards.length < 5) G.communityCards.push(G.deck.pop());
  }
  renderAll();
  reviewMode = true;
  renderReviewHighlights();
  markWinner(winnerIdx);
  // Show overlay
  const humanHand = getBestHand(G.players[HUMAN_SEAT].cards, G.communityCards);
  showOverlay(winner, profit, isHumanWin, humanHand, winnerHand);
  // Save hand history
  saveHandHistory(isHumanWin, profit, humanHand);
}

function markWinner(winnerIdx) {
  const el = document.querySelector(`#seat-${winnerIdx} .seat-info`);
  if (el) { el.className = el.className.replace('active',''); el.classList.add('winner'); }
}

// ============ 教练系统 ============
function updateCoach() {
  const human = G.players[HUMAN_SEAT];
  if (!G.running || human.folded) {
    document.getElementById('coach-equity').textContent = '--';
    document.getElementById('equity-bar').style.width = '0%';
    document.getElementById('coach-advice').innerHTML = human.folded ? '你已弃牌，等待下一局。' : '等待游戏开始...';
    return;
  }
  const activePlayers = G.players.filter(p => !p.folded && p.id !== HUMAN_SEAT);
  const equity = estimateEquity(human.cards, G.communityCards, activePlayers.length);
  const equityPct = Math.round(equity * 100);
  document.getElementById('coach-equity').textContent = equityPct + '%';
  document.getElementById('equity-bar').style.width = equityPct + '%';
  // Color equity bar: >50% green, 30-50% yellow, <30% red
  const bar = document.getElementById('equity-bar');
  if (equityPct > 50) bar.style.background = 'linear-gradient(90deg,#2e7d32,#81c784)';
  else if (equityPct > 30) bar.style.background = 'linear-gradient(90deg,#e65100,#ffb74d)';
  else bar.style.background = 'linear-gradient(90deg,#b71c1c,#e57373)';
  // EV analysis
  const pot = G.pot;
  const callAmt = Math.min(G.currentBet - human.bet, human.chips);
  const canCheck = G.currentBet === human.bet;
  // Fold EV = 0 (relative)
  const foldEV = 0;
  // Call EV = equity * (pot + callAmt) - callAmt * (1-equity)
  const callEV = callAmt > 0 ? (equity * (pot + callAmt) - callAmt * (1 - equity)).toFixed(0) : null;
  // Raise EV: for preflop premium hands use tier-adjusted fold equity
  const raiseAmt = G.raiseAmount || Math.max(G.minRaise, G.currentBet * 2);
  const raisePotential = pot + raiseAmt;
  let foldEquity;
  if (G.street === 'preflop') {
    const tier = getPreflopTier(human.cards[0], human.cards[1]);
    // Premium hands: opponents more likely to fold to 3bet (0.45-0.55 fold equity)
    // Marginal hands: lower fold equity
    foldEquity = Math.max(0.25, Math.min(0.60, 0.55 - (tier - 1) * 0.05));
  } else {
    foldEquity = 0.3 + (equity - 0.5) * 0.4; // estimated fold equity
  }
  const raiseEV = ((foldEquity * pot) + (1 - foldEquity) * (equity * (raisePotential + raiseAmt) - raiseAmt * (1 - equity))).toFixed(0);
  const evFoldEl = document.getElementById('ev-fold');
  const evCallEl = document.getElementById('ev-call');
  const evRaiseEl = document.getElementById('ev-raise');
  evFoldEl.textContent = '0';
  evFoldEl.className = 'ev-value neutral';
  if (canCheck) {
    evCallEl.textContent = 'Check (0)';
    evCallEl.className = 'ev-value neutral';
  } else {
    const cv = parseInt(callEV);
    evCallEl.textContent = (cv >= 0 ? '+' : '') + cv;
    evCallEl.className = 'ev-value ' + (cv >= 0 ? 'pos' : 'neg');
  }
  const rv = parseInt(raiseEV);
  evRaiseEl.textContent = (rv >= 0 ? '+' : '') + rv;
  evRaiseEl.className = 'ev-value ' + (rv >= 0 ? 'pos' : 'neg');
  // Highlight best action
  document.querySelectorAll('.ev-best').forEach(e=>e.remove());
  let bestEV = foldEV, bestAction = 'fold';
  if (canCheck && 0 > bestEV) { bestEV = 0; bestAction = 'check'; }
  else if (!canCheck && callEV && parseInt(callEV) > bestEV) { bestEV = parseInt(callEV); bestAction = 'call'; }
  if (parseInt(raiseEV) > bestEV) { bestEV = parseInt(raiseEV); bestAction = 'raise'; }
  const bestMap = { fold: evFoldEl, call: evCallEl, raise: evRaiseEl };
  const bestEl = bestMap[bestAction];
  if (bestEl) { const star = document.createElement('span'); star.className = 'ev-best'; star.textContent = ' ★'; bestEl.appendChild(star); }
  // Coach advice
  const handInfo = getBestHand(human.cards, G.communityCards);
  let advice = generateAdvice(equity, equityPct, canCheck, callAmt, pot, human, handInfo);
  document.getElementById('coach-advice').innerHTML = advice;
  // Position analysis
  updatePositionAnalysis(human);
  // Opponent analysis
  updateOpponentAnalysis();
}

function generateAdvice(equity, equityPct, canCheck, callAmt, pot, human, handInfo) {
  let advice = '';
  const street = G.street;
  const posName = human.position || '?';
  const isLate = isLatePosition(posName);
  const isEarly = isEarlyPosition(posName);

  // ---- Opponent context analysis ----
  const activeOpps = G.players.filter(p => !p.folded && p.id !== HUMAN_SEAT && p.style);

  // Build per-opponent action summary from actionLog for the current hand
  function getOppCurrentStreetAction(oppId) {
    return actionLog.filter(l => l.playerId === oppId && l.street === street);
  }
  function getOppPreflopAction(oppId) {
    return actionLog.filter(l => l.playerId === oppId && l.street === 'preflop');
  }

  // Identify the last aggressor (raiser/3-bettor) in current street
  const lastAggressorLog = [...actionLog].reverse().find(
    l => (l.action === 'raise' || l.action === 'allin') && l.street === street
  );
  const lastAggressorPreflop = [...actionLog].reverse().find(
    l => (l.action === 'raise' || l.action === 'allin') && l.street === 'preflop'
  );

  // Classify opponent pool
  const tightOpps = activeOpps.filter(p => p.styleKey === 'Rock' || p.styleKey === 'TAG');
  const looseOpps = activeOpps.filter(p => ['LAG','Maniac','CS'].includes(p.styleKey));
  const aggroOpps = activeOpps.filter(p => ['Aggro','Maniac','LAG'].includes(p.styleKey));
  const passiveOpps = activeOpps.filter(p => ['Passive','CS'].includes(p.styleKey));

  // Build a short opponent summary line
  function buildOppSummaryLine() {
    if (activeOpps.length === 0) return '';
    const parts = activeOpps.map(p => {
      const sc = p.styleKey;
      const colorMap = {TAG:'#90caf9',LAG:'#ce93d8',Rock:'#b0bec5',CS:'#a5d6a7',Maniac:'#ef9a9a',Balanced:'#80cbc4',Aggro:'#ffcc80',Passive:'#bcaaa4'};
      const col = colorMap[sc] || '#dde4ff';
      return `<span style="color:${col}">${p.name}(${sc})</span>`;
    });
    return `活跃对手：${parts.join('、')}<br>`;
  }

  // ---- Helper: clamp a recommended raise target within valid slider bounds
  function calcRaiseRec(target) {
    const minR = Math.max(G.currentBet + G.minRaise, G.currentBet > 0 ? G.currentBet * 2 : BB_AMOUNT * 2);
    const maxR = human.chips + human.bet;
    return Math.max(minR, Math.min(Math.round(target), maxR));
  }

  G.recommendedRaise = 0; // reset each call

  if (street === 'preflop') {
    // ---- Preflop: use starting hand tier logic ----
    const c1 = human.cards[0], c2 = human.cards[1];
    const tier = getPreflopTier(c1, c2);
    const key = preflopKey(c1, c2);

    const tierLabels = {
      1: '<span class="good">超强起手牌 (Top 3%)</span>',
      2: '<span class="good">强起手牌 (Top 6%)</span>',
      3: '<span class="highlight">不错的起手牌 (Top 12%)</span>',
      4: '<span class="highlight">可玩起手牌 (Top 25%)</span>',
      5: '<span class="bad">边缘牌 (Top 40%)</span>',
      6: '<span class="bad">垃圾牌</span>',
    };
    const posLabel = isLate ? `<span class="good">${posName}（有利）</span>` :
                     isEarly ? `<span class="bad">${posName}（不利）</span>` :
                     `<span class="highlight">${posName}</span>`;

    advice += `起手牌：<span class="highlight">${key}</span> ${tierLabels[tier] || ''} | 位置：${posLabel}<br>`;
    advice += buildOppSummaryLine();

    const facingRaise = !canCheck && callAmt > 0 && G.currentBet > BB_AMOUNT;

    // Identify who raised preflop (if anyone) for opponent-aware commentary
    const pfRaiser = lastAggressorPreflop
      ? G.players.find(p => p.id === lastAggressorPreflop.playerId)
      : null;

    if (tier === 1) {
      if (facingRaise) {
        const mult = isLate ? 3 : 3.5;
        const rec = calcRaiseRec(G.currentBet * mult);
        G.recommendedRaise = rec;
        if (pfRaiser && pfRaiser.styleKey === 'Rock') {
          advice += `<span class="good">顶级牌！</span> <span style="color:#b0bec5">${pfRaiser.name}(Rock)</span>加注range极紧(QQ+/AK)，但你的牌更强：<span class="highlight">3-bet 到 ${rec}</span>，建立大底池。`;
        } else if (pfRaiser && (pfRaiser.styleKey === 'Maniac' || pfRaiser.styleKey === 'Aggro')) {
          advice += `<span class="good">顶级牌！</span> <span style="color:#ef9a9a">${pfRaiser.name}(${pfRaiser.styleKey})</span>加注range很宽，大好机会：<span class="highlight">3-bet 到 ${rec}</span>，对手可能再加注或跟注。`;
        } else {
          advice += `<span class="good">顶级牌！</span> 面对加注 ${G.currentBet}：<span class="highlight">3-bet 到 ${rec}</span>（${mult}x对手加注），隔离对手建立大底池。`;
        }
      } else {
        const rec = calcRaiseRec(BB_AMOUNT * 3);
        G.recommendedRaise = rec;
        if (tightOpps.length >= 2) {
          advice += `<span class="good">顶级牌！</span> 桌上多为紧手玩家，加注可能被fold。建议：<span class="highlight">加注到 ${rec}</span>（3x BB），慢玩等翻牌也可考虑。`;
        } else if (looseOpps.length >= 2) {
          advice += `<span class="good">顶级牌！</span> 对手多为松散型，他们容易跟注/跟3-bet。<span class="highlight">加注到 ${rec}</span>，价值建底池。`;
        } else {
          advice += `<span class="good">顶级牌！</span> 建议：<span class="highlight">加注到 ${rec}</span>（3x BB），价值建底池。`;
        }
      }
    } else if (tier === 2) {
      if (facingRaise) {
        const mult = isLate ? 3 : 3.5;
        const rec = calcRaiseRec(G.currentBet * mult);
        G.recommendedRaise = rec;
        if (pfRaiser && pfRaiser.styleKey === 'Rock') {
          advice += `<span class="good">强牌。</span> <span style="color:#b0bec5">${pfRaiser.name}(Rock)</span>range极紧，他3-bet代表顶级牌。你的牌面对Rock加注<span class="highlight">跟注</span>或小3-bet到 ${rec}，谨慎行事。`;
        } else if (pfRaiser && (pfRaiser.styleKey === 'Maniac' || pfRaiser.styleKey === 'LAG')) {
          advice += `<span class="good">强牌。</span> <span style="color:#ef9a9a">${pfRaiser.name}(${pfRaiser.styleKey})</span>加注range宽，<span class="highlight">3-bet 到 ${rec}</span>（${mult}x）建底池，他大概率跟注。`;
        } else if (isEarly) {
          advice += `<span class="good">强牌。</span> 面对加注：<span class="highlight">3-bet 到 ${rec}</span> 或跟注，早位可收紧。`;
        } else {
          advice += `<span class="good">强牌。</span> 面对加注：<span class="highlight">3-bet 到 ${rec}</span>（${mult}x）建底池。`;
        }
      } else {
        const rec = calcRaiseRec(BB_AMOUNT * 3);
        G.recommendedRaise = rec;
        if (passiveOpps.length >= 2) {
          advice += `<span class="good">强牌。</span> 被动对手多，他们跟注但少加注，<span class="highlight">加注到 ${rec}</span> 价值下注效果好。`;
        } else {
          advice += `<span class="good">强牌。</span> 建议：<span class="highlight">加注到 ${rec}</span>（3x BB）。`;
        }
      }
    } else if (tier === 3) {
      if (facingRaise) {
        const rec = calcRaiseRec(G.currentBet * 3);
        G.recommendedRaise = rec;
        if (pfRaiser && pfRaiser.styleKey === 'Rock') {
          advice += `不错的起手牌，但<span style="color:#b0bec5">${pfRaiser.name}(Rock)</span>加注代表超强牌(QQ+/AKs)，<span class="bad">建议弃牌</span>，避免OOP劣势。`;
        } else if (pfRaiser && (pfRaiser.styleKey === 'Maniac' || pfRaiser.styleKey === 'LAG')) {
          advice += `不错的起手牌，<span style="color:#ef9a9a">${pfRaiser.name}(${pfRaiser.styleKey})</span>加注range很宽，<span class="highlight">跟注</span>或考虑3-bet到 ${rec}。`;
        } else if (isLate) {
          advice += `不错的起手牌，后位有利。面对加注可<span class="highlight">3-bet 到 ${rec}</span> 或跟注。`;
        } else {
          advice += `不错的起手牌。面对加注：考虑<span class="highlight">跟注</span>，3-bet需强牌支持。`;
        }
      } else {
        const rec = calcRaiseRec(BB_AMOUNT * 2.5);
        G.recommendedRaise = rec;
        if (tightOpps.length >= 3) {
          advice += `不错的起手牌，桌上紧手玩家多，加注被fold概率高。建议：<span class="highlight">加注到 ${rec}</span>（2.5x BB）可能直接偷盲。`;
        } else if (isLate) {
          advice += `不错的起手牌，后位有利。建议：<span class="highlight">加注到 ${rec}</span>（2.5x BB）。`;
        } else if (isEarly) {
          advice += `不错的起手牌，但早位需谨慎。建议：<span class="highlight">加注到 ${rec}</span>（2.5x BB），面对3bet可弃牌。`;
        } else {
          advice += `不错的起手牌。建议：<span class="highlight">加注到 ${rec}</span>（2.5x BB）进入翻牌。`;
        }
      }
    } else if (tier === 4) {
      if (facingRaise) {
        if (pfRaiser && pfRaiser.styleKey === 'Rock') {
          advice += `可玩牌，但<span style="color:#b0bec5">${pfRaiser.name}(Rock)</span>加注range极紧，你的牌<span class="bad">建议弃牌</span>。`;
        } else if (pfRaiser && (pfRaiser.styleKey === 'Maniac' || pfRaiser.styleKey === 'CS')) {
          advice += `可玩牌，<span style="color:#ef9a9a">${pfRaiser.name}(${pfRaiser.styleKey})</span>range宽松，底池赔率合适可<span class="highlight">跟注</span>看翻牌。`;
        } else if (isEarly) {
          advice += `可玩牌，早位范围偏紧。面对加注建议<span class="bad">弃牌</span>。`;
        } else {
          advice += `可玩牌。<span class="highlight">跟注</span>进入翻牌，控制底池。`;
        }
      } else if (isLate && !facingRaise) {
        const rec = calcRaiseRec(BB_AMOUNT * 2.5);
        G.recommendedRaise = rec;
        if (tightOpps.length >= 3) {
          advice += `可玩牌，后位且桌上多为紧手，<span class="highlight">偷盲加注到 ${rec}</span> 成功率高。`;
        } else {
          advice += `可玩牌，后位有利。建议：<span class="highlight">加注到 ${rec}</span>（2.5x BB）或跟注，看看翻牌。`;
        }
      } else if (isEarly) {
        advice += `可玩牌，早位范围偏紧。面对加注建议<span class="bad">弃牌</span>。`;
      } else {
        if (looseOpps.length >= 2) {
          advice += `可玩牌。桌上松手玩家多，<span class="highlight">跟注</span>进入翻牌，见机行事。`;
        } else {
          advice += `可玩牌。<span class="highlight">跟注</span>进入翻牌，控制底池。`;
        }
      }
    } else if (tier === 5) {
      if (isLate && canCheck) advice += `边缘牌，后位可免费看牌。建议：<span class="highlight">跟注</span>（仅在底池赔率合适时）。`;
      else if (isLate && !facingRaise) {
        const rec = calcRaiseRec(BB_AMOUNT * 2.5);
        G.recommendedRaise = rec;
        if (tightOpps.length >= 3) {
          advice += `边缘牌，后位且紧手玩家多，<span class="highlight">偷盲加注到 ${rec}</span> 胜率高。`;
        } else {
          advice += `边缘牌，后位可尝试<span class="highlight">偷盲加注到 ${rec}</span>（2.5x BB），否则弃牌。`;
        }
      } else if (facingRaise && pfRaiser && (pfRaiser.styleKey === 'Maniac' || pfRaiser.styleKey === 'CS')) {
        advice += `边缘牌，但<span style="color:#ef9a9a">${pfRaiser.name}(${pfRaiser.styleKey})</span>range极宽，底池赔率好时可<span class="highlight">跟注</span>一次翻牌。`;
      } else {
        advice += `边缘牌，位置不利。建议：<span class="bad">弃牌</span>。`;
      }
    } else {
      if (canCheck) {
        advice += `垃圾牌，免费看牌。`;
      } else if (facingRaise && pfRaiser && pfRaiser.styleKey === 'Maniac') {
        advice += `垃圾牌，虽然<span style="color:#ef9a9a">${pfRaiser.name}(Maniac)</span>range极宽，但赔率仍然不够，<span class="bad">建议弃牌</span>。`;
      } else {
        advice += `<span class="bad">垃圾牌，建议弃牌。</span>`;
      }
    }

    // Stack depth note
    const spr = human.chips / Math.max(G.pot, 1);
    if (spr < 5 && tier <= 2) advice += `<br>SPR=${spr.toFixed(1)}，浅筹码，<span class="good">考虑全下</span>。`;
    return advice;
  }

  // ---- Postflop: use made hand / draw classification ----
  const posLabel2 = `<span class="highlight">${posName}</span>`;
  const postInfo = classifyPostflopHand(human.cards, G.communityCards);
  const handLabel = postInfo && postInfo.label ? postInfo.label : (handInfo && handInfo.name ? handInfo.name : '未知');
  advice += `当前牌型：<span class="highlight">${handLabel}</span> | 胜率：${equityPct}% | 位置：${posLabel2}<br>`;
  advice += buildOppSummaryLine();

  // Identify who is betting this street (last aggressor)
  const streetBettor = lastAggressorLog
    ? G.players.find(p => p.id === lastAggressorLog.playerId)
    : null;

  if (equityPct >= 70) {
    // Strong value hand: bet 2/3 pot
    const betAmt = calcRaiseRec(pot * (2/3) + G.currentBet);
    G.recommendedRaise = betAmt;
    advice += `<span class="good">强牌!</span> 胜率 ${equityPct}%，`;
    if (streetBettor && (streetBettor.styleKey === 'Aggro' || streetBettor.styleKey === 'Maniac')) {
      advice += `<span style="color:#ef9a9a">${streetBettor.name}(${streetBettor.styleKey})</span>下注bluff频率高，可以<span class="highlight">check-raise</span>设陷阱，或直接<span class="highlight">价值下注到 ${betAmt}</span>（约2/3底池）。`;
    } else if (passiveOpps.length >= 2) {
      advice += `被动对手多，<span class="highlight">主动价值下注到 ${betAmt}</span>（约2/3底池），不要等check让他们免费摸牌。`;
    } else {
      advice += `<span class="highlight">价值下注到 ${betAmt}</span>（约2/3底池 ${Math.round(pot*2/3)}），不要慢玩。`;
    }
  } else if (equityPct >= 50) {
    advice += `<span class="good">中等牌力</span> (${equityPct}%)。`;
    if (canCheck) {
      if (aggroOpps.length >= 1) {
        const agOpp = aggroOpps[0];
        advice += `桌上有<span style="color:#ffcc80">${agOpp.name}(${agOpp.styleKey})</span>，check等他下注，再考虑跟注或check-raise。`;
      } else {
        advice += '可以看牌，控制底池。';
      }
    } else {
      const potOdds = callAmt / (pot + callAmt);
      if (equity > potOdds) {
        const betAmt = calcRaiseRec(pot * 0.5 + G.currentBet);
        G.recommendedRaise = betAmt;
        if (streetBettor && (streetBettor.styleKey === 'TAG' || streetBettor.styleKey === 'Rock')) {
          advice += `<span style="color:#90caf9">${streetBettor.name}(${streetBettor.styleKey})</span>下注更可信，谨慎<span class="good">跟注</span>，避免大底池。`;
        } else if (streetBettor && (streetBettor.styleKey === 'Maniac' || streetBettor.styleKey === 'Aggro')) {
          advice += `<span style="color:#ef9a9a">${streetBettor.name}(${streetBettor.styleKey})</span>下注bluff多，<span class="good">跟注</span>合理；也可下注到 ${betAmt}（约1/2底池）。`;
        } else {
          advice += `底池赔率 ${Math.round(potOdds*100)}%，胜率更高，<span class="good">跟注合理</span>；主动出击可下注到 ${betAmt}（约1/2底池）。`;
        }
      } else {
        advice += `底池赔率 ${Math.round(potOdds*100)}%，胜率${equityPct}%，<span class="bad">边界情况</span>，谨慎跟注。`;
      }
    }
  } else if (equityPct >= 30) {
    advice += `<span class="bad">弱牌</span> (${equityPct}%)。`;
    const potOdds = callAmt > 0 ? callAmt / (pot + callAmt) : 0;
    if (equity > potOdds && callAmt > 0) {
      if (streetBettor && (streetBettor.styleKey === 'TAG' || streetBettor.styleKey === 'Rock')) {
        advice += `<span style="color:#90caf9">${streetBettor.name}(${streetBettor.styleKey})</span>下注range紧，你的弱牌面对他需要更强的听牌才值得跟注。`;
      } else {
        advice += `有听牌潜力，底池赔率 ${Math.round(potOdds*100)}%，可考虑<span class="highlight">跟注</span>。`;
      }
      // Semi-bluff if drawing hand
      if (postInfo && postInfo.category === 'draw') {
        const betAmt = calcRaiseRec(pot * (2/3) + G.currentBet);
        G.recommendedRaise = betAmt;
        if (passiveOpps.length >= 2) {
          advice += `<br>听牌面对被动玩家 semi-bluff效果差，<span class="highlight">跟注</span>更安全。`;
        } else {
          advice += `<br>听牌可 semi-bluff <span class="highlight">加注到 ${betAmt}</span>（约2/3底池），给对手施压。`;
        }
      }
    } else {
      if (canCheck && aggroOpps.length >= 1) {
        const agOpp = aggroOpps[0];
        advice += `<span style="color:#ffcc80">${agOpp.name}(${agOpp.styleKey})</span>激进型，check可能引来bluff但你牌弱，<span class="bad">谨慎跟注</span>。`;
      } else {
        advice += '<span class="bad">考虑弃牌</span>，避免继续投入。';
      }
    }
  } else {
    advice += `<span class="bad">很弱 (${equityPct}%)</span>。`;
    if (canCheck) {
      advice += '免费看牌。';
    } else if (streetBettor && streetBettor.styleKey === 'Maniac') {
      advice += `虽然<span style="color:#ef9a9a">${streetBettor.name}(Maniac)</span>可能在bluff，但你的牌太弱，<span class="bad">弃牌</span>为妥。`;
    } else {
      advice += '<span class="bad">弃牌</span>节省筹码。';
    }
  }

  // Position note
  if (posName === 'BTN') advice += '<br><span class="good">有利位置(BTN)</span>，可适当扩宽范围。';
  else if (posName === 'UTG' || posName === 'UTG+1') advice += '<br><span class="bad">早位(UTG)</span>，收窄进牌范围。';

  // Stack depth advice
  const spr = human.chips / Math.max(G.pot, 1);
  if (spr < 3 && equityPct > 45) advice += `<br>SPR=${spr.toFixed(1)}，浅筹码，考虑全下。`;
  return advice;
}

function updatePositionAnalysis(human) {
  const pos = human.position || '?';
  const posAdvice = {
    BTN: '庄家位(BTN)<br>最有利位置，可范围最宽，盗取盲注，IP利用最大。',
    SB: '小盲(SB)<br>最不利，翻后OOP。收紧范围，避免OOP混乱状况。',
    BB: '大盲(BB)<br>有折扣跟注权，但翻后OOP。防守合适范围。',
    UTG: '枪口位(UTG)<br>最早行动，范围最窄。只玩强牌(20%)。',
    'UTG+1': 'UTG+1<br>次早位，稍宽于UTG。仍需紧，约22%范围。',
    MP: '中位(MP)<br>可扩至26%范围。对后位玩家留意。',
    'MP+1': 'MP+1<br>接近CO，约28%范围，开始扩宽。',
    CO: 'CO位<br>接近庄，约35%范围，可尝试盗注。',
    'CO+1': 'CO+1<br>较有利后位，约32%范围。',
  };
  document.getElementById('pos-analysis').innerHTML =
    `<span class="pos-label">${pos}</span><br>${posAdvice[pos] || '位置信息: '+pos}`;
}

function updateOpponentAnalysis() {
  const active = G.players.filter(p => !p.folded && p.id !== HUMAN_SEAT);
  let html = '';
  for (const p of active) {

}
